<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finding gap — 서비스</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Finding gap">
<meta property="og:title" content="Finding gap — 서비스">
<meta property="og:description" content="지도에서 시도·시군구별 발견공백을 확인하고 발견 제보를 남겨보세요.">
<meta property="og:image" content="https://rachhus.github.io/Finding-gap/og-image.png">
<meta property="og:url" content="https://rachhus.github.io/Finding-gap/service.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
<style>
  :root{
    --ink:#1b201d;--muted:#6b7280;--faint:#9aa0a6;--line:#e7e7e2;--bg:#fafaf8;--card:#fff;--accent:#2f6f5e;
    --r-ex:#000;--r-ew:#3D2645;--r-re:#6B4E71;--r-cr:#D81E05;--r-en:#FC7F3F;--r-vu:#F2DC00;
    --r-nt:#C3D838;--r-lc:#5CB85C;--r-dd:#CFCFC4;--r-nena:#E6E6DE;--eg1:#7F1D1D;--eg2:#C2410C;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;line-height:1.5}
  .wrap{max-width:1280px;margin:0 auto;padding:20px 16px 64px}
  a{color:inherit}
  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{margin:0;font-size:20px;letter-spacing:-.01em}
  header h1 b{color:var(--accent)}
  header .back{font-size:12.5px;color:var(--muted);text-decoration:none;border:1px solid var(--line);
    border-radius:8px;padding:6px 11px;background:#fff}
  header .back:hover{border-color:var(--accent);color:var(--accent)}
  .tabs{display:flex;gap:6px;margin:16px 0 14px;border-bottom:1px solid var(--line)}
  .tabs button{border:0;background:none;padding:10px 16px;font-size:14px;cursor:pointer;color:#666;
    border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:600}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:12px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em}
  select,input[type=search]{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px}
  select{min-width:130px}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{border:0;background:#fff;padding:8px 12px;font-size:12.5px;cursor:pointer;color:#555}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  .selchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#555}
  .selchips .c{background:#eef3f1;border:1px solid #d7e3df;border-radius:999px;padding:3px 9px}
  .selchips .clr{cursor:pointer;color:var(--accent);text-decoration:underline;background:none;border:0;font-size:12px}
  .split{display:grid;grid-template-columns:1.15fr 1fr;gap:16px}
  @media(max-width:880px){.split{grid-template-columns:1fr}}
  #map,#mapB{width:100%;height:560px;border:1px solid var(--line);border-radius:var(--radius);background:#eef0ee;position:relative}
  @media(max-width:880px){#map,#mapB{height:400px}}
  .mapmsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:20px;color:#777;font-size:13px;pointer-events:none}
  .legend{display:flex;align-items:center;gap:8px;font-size:11px;color:#666;margin-top:8px}
  .ramp{height:10px;width:120px;border-radius:3px;background:linear-gradient(90deg,#1a9850,#fee08b,#d73027)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;max-height:560px}
  @media(max-width:880px){.panel{max-height:none}}
  .panel h2{margin:0;padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--line);background:#fcfcfb;
    display:flex;align-items:center;gap:8px}
  .panel h2 .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:500}
  .panel h2 .dl{font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 9px;background:#fff;cursor:pointer}
  .tblwrap{overflow:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{padding:7px 10px;text-align:left;border-bottom:1px solid #f1f1ee;white-space:nowrap}
  #tbl th,#tbl td{padding:7px 6px}                         /* 6열 수용 위해 종 목록만 가로 패딩 축소 */
  th{position:sticky;top:0;background:#fbfbfa;cursor:pointer;font-size:11.5px;color:#555;user-select:none;z-index:1}
  tbody tr.rowlink{cursor:pointer}
  tbody tr.rowlink:hover{background:#f1f6f3}
  th:hover{color:var(--accent)}
  th .ar{font-size:10px;margin-left:3px}
  th .ar.on{color:var(--accent)}
  th .ar.off{color:#c6cac6}
  th:hover .ar.off{color:#9aa0a6}
  .panel h2 .hint{margin-left:8px;font-size:10.5px;color:var(--faint);font-weight:400}
  td .sci{font-style:italic;color:var(--muted)}
  .badge{font-size:10px;font-weight:700;border-radius:999px;padding:1px 6px;white-space:nowrap}
  .st{display:inline-flex;align-items:center;gap:4px;font-size:11.5px}
  .dot{width:7px;height:7px;border-radius:999px;display:inline-block}
  .num{font-variant-numeric:tabular-nums;text-align:right}
  /* 관심도 셀: 미니 막대 + 수치 */
  td.ivcell{white-space:nowrap}
  .ivbar{display:inline-block;vertical-align:middle;width:34px;height:5px;background:#eef1f0;border-radius:3px;overflow:hidden;margin-right:5px}
  .ivbar>span{display:block;height:100%;background:#6a9a86}
  @media(min-width:881px){                                /* 데스크톱: 6열이 좁은 패널(~570px)에 들어가도록 이름열 말줄임(전체는 hover·종페이지) */
    #tbl td:nth-child(1){max-width:118px;overflow:hidden;text-overflow:ellipsis}
    #tbl td:nth-child(2){max-width:132px;overflow:hidden;text-overflow:ellipsis}
  }
  /* 주목할 미발견 종 추천 스트립 */
  .recstrip{padding:9px 14px 4px;border-bottom:1px solid var(--line);background:#fcfdfc}
  .recstrip .rec-h{font-size:11.5px;font-weight:600;color:#4f6f61;margin-bottom:7px}
  .recstrip .rec-h .rec-sub{font-weight:400;color:var(--faint);margin-left:6px}
  /* 물음표 툴팁: 옅은 안내문을 아이콘 뒤로 — 호버·포커스·탭(모바일) 시 표출 */
  .qtip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;
    border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:10px;line-height:1;
    font-weight:700;cursor:help;padding:0;margin-left:5px;vertical-align:middle;flex:none;appearance:none}
  .qtip:hover,.qtip:focus,.qtip.on{border-color:var(--accent);color:var(--accent);outline:none}
  .qtip::after{content:attr(data-tip);position:absolute;left:-4px;top:calc(100% + 7px);z-index:60;width:max-content;
    max-width:min(240px,74vw);padding:7px 10px;border-radius:8px;background:#2b332e;color:#fff;font-size:11.5px;
    font-weight:400;line-height:1.5;text-align:left;white-space:normal;box-shadow:0 6px 20px rgba(0,0,0,.18);
    opacity:0;visibility:hidden;transition:opacity .12s}
  .qtip::before{content:"";position:absolute;left:3px;top:calc(100% + 2px);border:5px solid transparent;
    border-bottom-color:#2b332e;opacity:0;visibility:hidden;transition:opacity .12s;z-index:61}
  .qtip:hover::after,.qtip:focus::after,.qtip.on::after,
  .qtip:hover::before,.qtip:focus::before,.qtip.on::before{opacity:1;visibility:visible}
  .rec-chips{display:flex;flex-wrap:wrap;gap:6px}
  .rec-chip{appearance:none;cursor:pointer;border:1px solid #dfe7e2;background:#fff;border-radius:999px;
    padding:5px 11px;font-size:12px;color:#3a4a43;display:inline-flex;align-items:center;gap:7px;max-width:100%}
  .rec-chip:hover{border-color:#9ec3b2;background:#f4f9f6}
  .rec-chip .rc-n{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
  .rec-chip .rc-n .sci{font-style:italic;font-weight:600;color:#5a5f5c}
  .rec-chip .rc-iv{width:34px;height:5px;background:#eef1f0;border-radius:3px;overflow:hidden;flex:none}
  .rec-chip .rc-iv>span{display:block;height:100%;background:#6a9a86}
  /* mode B */
  .searchrow{display:flex;gap:10px;align-items:center;margin-bottom:6px}
  .searchrow input{flex:1;max-width:440px}
  .scount{font-size:12px;color:var(--muted)}
  .sresults{border:1px solid var(--line);border-radius:var(--radius);max-height:300px;overflow:auto;background:#fff;margin-bottom:16px}
  .sresults .r{padding:9px 14px;border-bottom:1px solid #f1f1ee;cursor:pointer;display:flex;align-items:center;gap:9px}
  .sresults .r:hover{background:#f6f7f5}
  .sresults .r:last-child{border-bottom:0}
  .sresults .nm{font-weight:600}.sresults .sci{font-style:italic;color:var(--muted);font-size:12px}
  .sresults .tg{margin-left:auto;font-size:11px;color:var(--faint)}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;max-width:720px}
  .scard h3{margin:0 0 2px;font-size:19px}
  .scard .sci{font-style:italic;color:var(--muted);font-size:13.5px}
  .scard .row{margin-top:14px}
  .scard .row .k{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:5px}
  .map-ctrls{position:absolute;top:8px;right:8px;display:flex;gap:6px;z-index:2}
  .reg-toggle{display:flex;background:#fff;border:1px solid #cdd5d1;border-radius:7px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.14)}
  .reg-toggle button{border:0;background:#fff;padding:5px 11px;font:600 12px system-ui,sans-serif;color:#5a665f;cursor:pointer}
  .reg-toggle button.on{background:var(--accent);color:#fff}
  .reg-toggle button+button{border-left:1px solid #e3e8e5}
  .reg-toggle button.poly{min-width:44px;text-align:center;letter-spacing:.3px}
  /* 내 주변(geolocation → 시군구 발견공백) */
  .nearbybtn{appearance:none;border:1px solid #cdd5d1;background:#fff;border-radius:8px;padding:8px 12px;
    font:600 12.5px system-ui,sans-serif;color:#3a4a43;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .nearbybtn:hover{border-color:var(--accent);color:var(--accent)}
  .nearbybtn:disabled{opacity:.6;cursor:default}
  .nearby-msg{font-size:11px;line-height:1.4;color:#a03027}
  .nearby-msg:empty{display:none}
  .nearby-msg.ok{color:var(--muted)}
  .regtbl-wrap{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:8px}
  .regtbl{width:100%;border-collapse:collapse;font-size:13px}
  .regtbl thead th{position:sticky;top:0;background:#f4f6f4;text-align:left;padding:6px 10px;font-weight:600;color:#3b463f;border-bottom:1px solid var(--line);white-space:nowrap}
  .regtbl td{padding:5px 10px;border-bottom:1px solid #f0f2f0}
  .regtbl tbody tr:last-child td{border-bottom:0}
  .regtbl .num{text-align:right;font-variant-numeric:tabular-nums}
  .regtbl-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:7px;flex-wrap:wrap}
  .spview-tg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .spview-tg button{border:0;background:#fff;color:#5a635d;font-size:12px;padding:3px 10px;cursor:pointer;font-weight:500}
  .spview-tg button+button{border-left:1px solid var(--line)}
  .spview-tg button.on{background:var(--accent);color:#fff}
  .gaplegend{display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;font-size:11px;color:#5a635d;margin-bottom:7px}
  .gaplegend .lgi{display:inline-flex;align-items:center;gap:5px}
  .gaplegend .lgi i{width:11px;height:11px;border-radius:2px;display:inline-block;flex:none}
  .gaptbl tbody tr{cursor:pointer}
  .gaptbl tbody tr:hover td{background:#f1f6f3}
  .rdl{border:1px solid var(--accent);background:#fff;color:var(--accent);font:600 12px system-ui,sans-serif;padding:5px 11px;border-radius:7px;cursor:pointer}
  .rdl:hover{background:var(--accent);color:#fff}
  /* 종 카드 — 발견지점 기후 및 고도 막대 */
  .khead{display:flex;align-items:center;gap:6px}
  .envhead{display:grid;grid-template-columns:92px 1fr 138px;gap:9px;align-items:center;margin:0 0 7px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .envhead .vh{grid-column:3;text-align:right;font-size:11px;font-weight:600;color:#5a635d;white-space:nowrap}
  .envlegend{display:flex;flex-wrap:wrap;align-items:center;gap:6px 13px;font-size:11px;color:#5a635d}
  .envlegend.foot{margin:11px 0 0;padding-top:9px;border-top:1px solid var(--line)}
  .envlegend .lgi{display:inline-flex;align-items:center;gap:5px}
  .envlegend .lgi i{display:inline-block;flex:none}
  .envlegend i.lg-area{width:18px;height:10px;border-radius:5px;background:#eceeec;border:1px solid #dcdfdc}
  .envlegend i.lg-ncirc{width:8px;height:8px;border-radius:999px;background:#d6312b}
  .envlegend i.lg-range{width:18px;height:2px;border-radius:1px;background:#aeb6b0}
  .envlegend i.lg-box{width:18px;height:10px;border-radius:3px;background:var(--accent);opacity:.6}
  .envlegend i.lg-smed{width:2px;height:13px;border-radius:1px;background:#1b3a31}
  .envbars{display:flex;flex-direction:column;gap:9px;margin-top:2px}
  .envrow{display:grid;grid-template-columns:92px 1fr 138px;align-items:center;gap:9px;font-size:12px}
  .envrow .lbl{color:#414a45}
  .envtrack{position:relative;height:11px;background:#eceeec;border-radius:6px}
  .envtrack .whisk{position:absolute;top:50%;height:2px;margin-top:-1px;background:#aeb6b0;border-radius:1px}
  .envtrack .seg{position:absolute;top:0;height:11px;border-radius:4px;background:var(--accent);opacity:.6}
  .envtrack .smed{position:absolute;top:-2px;width:2px;height:15px;background:#1b3a31;border-radius:1px}
  .envtrack .nmed{position:absolute;top:50%;width:7px;height:7px;margin:-3.5px 0 0 -3.5px;border-radius:999px;
    background:#d6312b;box-shadow:0 0 0 1.5px #fff}
  .envrow .val{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .envrow .val b{color:var(--ink);font-weight:600}
  .envnote{font-size:11px;color:var(--faint);margin-top:8px}
  /* 지도 — 환경변수 레이어 컨트롤 */
  .env-ctrl{position:absolute;top:8px;left:8px;z-index:2;background:#fff;border:1px solid #cdd5d1;border-radius:8px;
    box-shadow:0 1px 4px rgba(0,0,0,.14);padding:7px 9px;width:188px;font:12px system-ui,sans-serif}
  .env-ctrl select{width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink)}
  .env-legend{margin-top:7px;display:none}
  .env-legend.on{display:block}
  .env-grad{height:9px;border-radius:5px;border:1px solid rgba(0,0,0,.08)}
  .env-scale{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .env-op{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:10.5px;color:var(--muted)}
  .env-op input{flex:1}
  .regchips{display:flex;flex-wrap:wrap;gap:6px}
  .regchips .rc{background:#eef3f1;border:1px solid #d7e3df;border-radius:8px;padding:4px 9px;font-size:12px}
  .regchips .rc b{font-variant-numeric:tabular-nums;color:var(--accent)}
  .links{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .lk{display:inline-flex;align-items:center;gap:7px;text-decoration:none;border:1px solid var(--line);
    border-radius:10px;padding:10px 14px;font-size:13px;background:#fff}
  .lk:hover{border-color:var(--accent)}
  .lk .t{font-weight:600}.lk .d{font-size:11px;color:var(--muted)}
  .lk.primary{border-color:#cdddc8;background:#f4f8f6}
  .lk.danger{border-color:#e7c9c0;background:#fdf4f1}
  .lk.danger .t{color:#a23b1a}
  .muted{color:var(--muted);font-size:12.5px}
  footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--line);color:var(--muted);font-size:11.5px;line-height:1.7}

  /* ═══════ 모바일(≤880px) 반응형 — 데스크톱(≥881px)은 위 규칙 그대로 ═══════ */
  @media(max-width:880px){
    .wrap{padding:14px 12px 56px}
    header h1{font-size:18px}
    header .back{padding:8px 14px;min-height:44px;display:inline-flex;align-items:center;font-size:13px}

    /* 탭: 스크롤 중에도 모드 전환 접근 가능하게 상단 고정 */
    .tabs{position:sticky;top:0;z-index:100;background:var(--bg);margin:12px 0 12px;padding-top:2px;box-shadow:0 1px 0 var(--line)}
    .tabs button{min-height:44px}

    /* 컨트롤: 고정폭(min-width:130px) 제거 → 가변폭 분할 + 줄바꿈 */
    .controls{gap:8px 10px}
    .controls .field{flex:1 1 104px;min-width:0}
    select{min-width:0;width:100%;min-height:44px}
    input[type=search]{min-height:44px}
    .seg{width:100%}
    .seg button{flex:1;min-height:44px;padding:10px 8px}

    /* 좌우 분할 → 세로 스택(지도 위·목록 아래, .split 1열 전환은 기존 규칙) */
    .split{position:relative;z-index:1}

    /* 지도 오버레이 폭 제한 → 지도 팬/줌 공간 확보 */
    .env-ctrl{width:auto;max-width:150px;font-size:11px;padding:6px 8px}
    .env-ctrl select{min-height:0;padding:5px 6px}
    .env-ctrl .env-op input{min-height:0}
    .map-ctrls{z-index:2}
    .reg-toggle button{min-height:40px;display:inline-flex;align-items:center}

    /* 범례: 줄바꿈 허용 + 컬러바 축소 */
    .legend{flex-wrap:wrap;gap:6px 8px;font-size:10.5px}
    .ramp{width:84px;flex:none}
    #legCap,#legCapB{flex-basis:100%}

    /* 종 목록(Mode A): 5열 테이블 → 카드(가로 스크롤 없이 세로 스캔) */
    #tbl,#tbl tbody{display:block;width:100%}
    #tbl thead{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}  /* 시각적으로만 숨김 — 스크린리더는 열 이름 읽음 */
    #tbl tbody tr{display:block}
    #tbl tbody tr.rowlink{border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 12px;margin:0 0 8px}
    #tbl tbody tr.rowlink:hover{background:#f6f9f7}
    #tbl td{display:inline;border:0;padding:0;white-space:normal;font-size:13px}
    #tbl td:nth-child(1){display:block;font-weight:600;font-size:14px;line-height:1.35}
    #tbl td:nth-child(1) .sci{font-weight:600;font-size:14px}
    #tbl td:nth-child(2){display:block;margin:1px 0 8px;font-size:12px}
    #tbl td:nth-child(3),#tbl td:nth-child(4){margin-right:6px}
    #tbl td:nth-child(5){display:block;margin-top:8px;color:var(--muted);font-size:12px;text-align:left}
    #tbl td:nth-child(5):empty{display:none}
    #tbl td:nth-child(5):not(:empty)::before{content:"관심도 ";color:var(--faint)}

<script>
/* ── 토큰·상수 ── */
const RL_FILL={EX:'#000',EW:'#3D2645',RE:'#6B4E71',CR:'#D81E05',EN:'#FC7F3F',VU:'#F2DC00',NT:'#C3D838',LC:'#5CB85C',DD:'#CFCFC4',NENA:'#E6E6DE'};
const RL_FG={EX:'#fff',EW:'#fff',RE:'#fff',CR:'#fff',EN:'#4A1B0C',VU:'#5C5300',NT:'#3B4D00',LC:'#103D17',DD:'#3F3F38',NENA:'#44443E'};
const RL_KOR={EX:'절멸',EW:'야생절멸',RE:'지역절멸',CR:'위급',EN:'위기',VU:'취약',NT:'준위협',LC:'최소관심',DD:'정보부족',NENA:'미평가·미적용'};
const normCat=r=>(r==='NE'||r==='NA')?'NENA':r;
const TAXON_KOR={MM:'포유류',AV:'조류',RP:'파충류',AM:'양서류','-P':'어류',UC:'미삭동물',IV:'무척추동물(곤충제외)',IN:'곤충류',VP:'관속식물',MS:'선태류'};
const nf=n=>Number(n).toLocaleString('ko-KR');
/* 외부 링크 */
const NIBR=k=>`https://species.nibr.go.kr/species-detail/${k}`;
const NATURING='https://www.naturing.net/m/3458/summary';
const ECOBANK='https://www.nie-ecobank.kr/dataCnrs/B/list.do';
const isEndangered=g=>g==='I'||g==='II';

const OBS=window.__OBS__||{};                          // 분류군 메타({years,sidos,…}); obs 배열은 선택 시 지연 로드
const OMETA=window.__OBSMETA__||{};
const ENVMETA=window.__ENVMETA__||null;               // 환경변수 메타(5변수·전국기준 분포·지도 레이어)
let ENV=window.__ENV__||null, _envCbs=null;           // 종별 환경 5수치([15]) — 종 카드에서만 쓰므로 지연 로드
function ensureEnv(cb){
  if(window.__ENV__){ ENV=window.__ENV__; cb&&cb(); return; }
  if(_envCbs){ _envCbs.push(cb); return; }
  _envCbs=[cb];
  const done=()=>{ ENV=window.__ENV__||{}; const cbs=_envCbs; _envCbs=null; cbs.forEach(f=>f&&f()); };
  const s=document.createElement('script'); s.src='demo/data/species_env.js';
  s.onload=done; s.onerror=()=>{ window.__ENV__=window.__ENV__||{}; console.warn('환경자료 로드 실패'); done(); };
  document.head.appendChild(s);
}
/* ── 분류군 관측 지연 로드(분류군별 파일 분할·인코딩) ──
   obs_meta.js 가 OBS[t]={years,…} 메타만 싣고, obs_<T>.js 를 필요 시 주입해
   {k:[ktsn],s:[sido],o:[[kIdx,sIdx,year_int,count]]} 를 병합 → decodeTaxon 으로 기존 형태 복원. */
const _txfile=t=>t.replace(/[^A-Za-z0-9]/g,'_');
const _loadCbs={};
function decodeTaxon(t){
  const d=OBS[t]; if(!d||!d.o) return;
  const K=d.k, S=d.s;
  d.obs=d.o.map(r=>[K[r[0]], S[r[1]], r[2]?String(r[2]):'', r[3]]);  // [ktsn, sido, year, count]
  d.o=null; d.k=null;                                  // 압축형 해제(메모리 회수)
}
function taxonReady(t){ return !t || !OBS[t] || !!OBS[t].obs; }   // 메타에 없는 분류군=관측자료 없음(준비됨 처리)
function loadTaxon(t, cb){
  if(taxonReady(t)){ cb&&cb(); return; }
  if(_loadCbs[t]){ _loadCbs[t].push(cb); return; }
  _loadCbs[t]=[cb];
  const done=()=>{ const cbs=_loadCbs[t]; _loadCbs[t]=null; cbs.forEach(f=>f&&f()); };
  const s=document.createElement('script');
  s.src=`demo/data/obs_${_txfile(t)}.js`;
  s.onload=()=>{ decodeTaxon(t); done(); };
  s.onerror=()=>{ if(OBS[t])OBS[t].obs=OBS[t].obs||[]; console.warn('관측자료 로드 실패',t); done(); };
  document.head.appendChild(s);
}
const TAXA=(window.__TAXA__||[]).filter(t=>t.has_data); // 데이터 보유 분류군만 노출
const SPIDX=window.__SPIDX__||[];                       // 서비스 종 인덱스(제외종 반영)
function interestOf(k){return ((window.__SPINT__||{})[k]||0)/1000;}   // 관심도 0~1(층 내 백분위; 자산 없으면 0)
function ivCell(iv){const p=Math.round((iv||0)*100);return p>0?`<span class="ivbar" aria-hidden="true"><span style="width:${p}%"></span></span>${p}`:'';}
const KEY=window.VWORLD_KEY||'';
const ROWCAP=1500;                                      // 대용량 분류군 테이블 표시 상한(전체는 CSV)
const SP_BY_TAX={};                                     // 분류군 → 종목록(검색 인덱스 파생)
for(const sp of SPIDX){ (SP_BY_TAX[sp.t]||(SP_BY_TAX[sp.t]=[])).push(sp); }
const ALL_YEARS=[...new Set(Object.values(OBS).flatMap(d=>d.years||[]))].map(Number).sort((a,b)=>a-b);

/* ── 배지 ── */
function badges(g,r){
  let h='';
  if(g) h+=`<span class="badge" style="background:${g==='I'?'var(--eg1)':'var(--eg2)'};color:#fff">멸종위기 ${g}급</span> `;
  const rc=normCat(r);
  if(rc) h+=`<span class="badge" style="background:${RL_FILL[rc]};color:${RL_FG[rc]}">${r==='NE'||r==='NA'?'NE/NA':r}</span>`;
  return h;
}
/* 분리 배지(테이블 전용): 멸종위기종 / 국가적색목록 별도 컬럼 */
function egBadge(g){
  if(!g) return '<span class="muted">—</span>';
  return `<span class="badge" style="background:${g==='I'?'var(--eg1)':'var(--eg2)'};color:#fff" title="야생생물 보호법 멸종위기 ${g}급">멸종위기 ${g}급</span>`;
}
function rlBadge(r){
  const rc=normCat(r);
  if(!rc) return '<span class="muted">—</span>';
  return `<span class="badge" style="background:${RL_FILL[rc]};color:${RL_FG[rc]}" title="국가적색목록 ${RL_KOR[rc]||rc}">${r==='NE'||r==='NA'?'NE/NA':r}</span>`;
}
/* 적색목록 심각도 순위(EX 최상위 … 미분류 최하위) */
const RL_RANK={EX:0,EW:1,RE:2,CR:3,EN:4,VU:5,NT:6,LC:7,DD:8,NENA:9};
const rlr=r=>{ const rc=normCat(r); return (rc&&rc in RL_RANK)?RL_RANK[rc]:99; };
const SIDO_ABBR={'서울특별시':'서울','부산광역시':'부산','대구광역시':'대구','인천광역시':'인천',
  '광주광역시':'광주','대전광역시':'대전','울산광역시':'울산','세종특별자치시':'세종','경기도':'경기',
  '강원특별자치도':'강원','충청북도':'충북','충청남도':'충남','전북특별자치도':'전북','전라남도':'전남',
  '경상북도':'경북','경상남도':'경남','제주특별자치도':'제주'};
const shortSido=s=>SIDO_ABBR[s]||(s||'').replace(/(특별자치도|특별자치시|특별시|광역시|도)$/,'')||s;

/* ═══════ 공유 상태 ═══════ */
let map=null, sidoLayer=null, SIDO_NAMES=[], mapMode='A';   // sidoLayer = 활성 경계 레이어(토글 시 재지정)
const DEEPLINK={};                                          // 딥링크 대기값(경계 레이어 로드 후 반영): {sigungu}
const ENVLAYERS={}; let envActive='', envOpacity=0.7, envCtrlEl=null;   // 지도 환경변수 래스터(폴리곤 아래)
function fmtVal(x,v){ return v && v.dec ? (+x).toFixed(v.dec) : Math.round(+x).toLocaleString('en-US'); }
let regLevel='sido', regToggleEl=null;                     // 행정구역 표시 레벨(시도 ⇄ 시군구)
let polyVisible=true, polyToggleEl=null;                   // 지역 경계 폴리곤 표시/숨김(검색 필터와 무관·시각화만)
let regSortKey='c', regSortDir=-1;                         // 발견지역 표 정렬(기본 발견수 내림차순)
const LAYERS={sido:null,sigungu:null};                     // 두 경계 레이어(활성만 표시)
const ACODES={sido:[],sigungu:[]};                         // 레벨별 코드 목록(choropleth 순회)
const RNAME={sido:{},sigungu:{}};                          // 코드 → 이름
let curTaxon='MM', y0=null, y1=null, metric='found', sortKey='c', sortDir=-1;
let selSidos=new Set(), METRIC=new Map(), DOM={min:0,max:1};   // selSidos = 활성 레벨 선택 코드
let SRES=[], selSpecies=null, selRegions=new Map(), selRegMax=0, sTax='', sy0=null, sy1=null;
/* obs 의 region 은 시군구코드(5자리, 미상 '00000'); 시도는 앞2자리로 롤업 */
function rkey(code){ return regLevel==='sido' ? String(code).slice(0,2) : String(code); }
function isUnknownReg(c){ return !c || c==='00' || c==='00000'; }
function rname(code){ if(isUnknownReg(code)) return '좌표미상';
  const n=RNAME[regLevel][code]||code; return regLevel==='sido'?shortSido(n):n; }

/* ═══════ 발견공백 A: 환경적합 미발견후보 ═══════
   종카드 발견/미발견 토글. 미발견 = 학습없는 BIOCLIM 엔벨로프(종 q1/q3 → [Q1-1.5IQR,Q3+1.5IQR], AND, binary).
   자산: env_grid.js(__GRID__ 전국 1km 셀) · cells_<T>.js(__CELLS__[t] 종별 점유) · gap_meta.js(__GAPMETA__).
   엔벨로프는 이미 로드된 __ENV__(종 분위수)로 즉석 산출 → 별도 자산 불필요. */
let GRID=null, GAPMETA=null, GIDX=null, spView='found', GAPRES=null;   // spView: 종카드 우측 표 전환(발견/미발견)
let gapLayer=null, gapSource=null;                                     // 후보셀 Canvas2D Vector 레이어(모드 B·gap 뷰)
const GAP_COL={new:'#1a9641', old:'#e08214', recent:'#9fb0a8'};        // 신규후보·재발견후보·최근발견
const GAP_OPA={0:0.85, 1:0.8, 2:0.55};                                 // st별 채움 불투명도
const _hexA=(h,a)=>{ const n=parseInt(h.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };
const GAP_MODEL=['bio01','bio06','bio12','dem','ndvi'];                // 전 종 공통(ndwi 는 수생 종만 추가)
const IQR_K=0.95;   // 엔벨로프 폭 = [Q1-K·IQR, Q3+K·IQR]. K=0.95≈중앙 95%(정규기준), 1.5=Tukey울타리(≈99%), 0.72≈90%
function _loadScript(src, cb){ const s=document.createElement('script'); s.src=src;
  s.onload=cb; s.onerror=()=>{ console.warn('로드 실패',src); cb(); }; document.head.appendChild(s); }
let _gapCbs=null;
function ensureGap(cb){                                   // gap_meta + env_grid 지연 로드(최초 미발견 진입 시)
  if(GRID&&GAPMETA){ cb&&cb(); return; }
  if(_gapCbs){ _gapCbs.push(cb); return; }
  _gapCbs=[cb]; let need=2;
  const done=()=>{ if(--need>0) return;
    GRID=window.__GRID__||{}; GAPMETA=window.__GAPMETA__||{};
    GAPMETA._ndwi=new Set(GAPMETA.ndwi||[]);
    GIDX=new Map(); const c=GRID.cid||[]; for(let i=0;i<c.length;i++) GIDX.set(c[i],i);
    const cbs=_gapCbs; _gapCbs=null; cbs.forEach(f=>f&&f()); };
  _loadScript('demo/data/gap_meta.js', done);
  _loadScript('demo/data/env_grid.js', done);
}
const _cellCbs={};
function cellsReady(t){ return !t || !!((window.__CELLS__||{})[t]); }
function loadCells(t, cb){                                // 분류군별 종 점유(obs_<T> 와 동일 지연 라우팅)
  if(cellsReady(t)){ cb&&cb(); return; }
  if(_cellCbs[t]){ _cellCbs[t].push(cb); return; }
  _cellCbs[t]=[cb];
  const done=()=>{ const cbs=_cellCbs[t]; _cellCbs[t]=null; cbs.forEach(f=>f&&f()); };
  _loadScript(`demo/data/cells_${_txfile(t)}.js`, done);
}
function speciesEnvelope(sp){                             // 종 → {var:[lo,hi]} (IQR 엔벨로프; ndwi 는 수생 종만)
  const row=(window.__ENV__||{})[sp.k]; if(!row||!ENVMETA) return null;
  const vi={}; ENVMETA.vars.forEach((v,i)=>{ vi[v.key]=i; });
  const model=GAP_MODEL.concat(GAPMETA._ndwi.has(sp.k)?['ndwi']:[]);
  const env={};
  for(const k of model){ const idx=vi[k]; if(idx==null) continue;
    const b=idx*7, q1=row[b+1], q3=row[b+3];
    if(q1==null||q3==null) continue; const iqr=q3-q1;
    env[k]=[q1-IQR_K*iqr, q3+IQR_K*iqr]; }
  return env;
}
function computeCandidate(sp){                            // 셀별 3상태 분류 + 시군구 적합지 비율
  const n=(GAPMETA.n&&GAPMETA.n[sp.k])||0;
  if(n<10) return {gated:true, n};                        // 신뢰게이트: 관측 n<10 → 후보 미제공
  const env=speciesEnvelope(sp); const keys=env?Object.keys(env):[];
  if(!keys.length) return {gated:true, n};
  const S=GRID.scale, cid=GRID.cid, lon=GRID.lon, lat=GRID.lat, sg=GRID.sg;
  const CT=window.__CELLS__||{}, occ=new Map(), oc=(CT[sp.t]||{})[sp.k];
  if(oc){ for(let j=0;j<oc.c.length;j++) occ.set(oc.c[j], oc.y[j]); }
  const cutoff=new Date().getFullYear()-10;               // 재발견 기준 = 현재연도-10(동적)
  const cells=[], numBySg=new Map(); let cNew=0, cOld=0, cRec=0;
  for(let i=0;i<cid.length;i++){
    const o=occ.get(cid[i]); let st;
    if(o!==undefined){ st=(o>cutoff)?2:1; if(st===2)cRec++; else cOld++; }   // 최근발견 / 재발견후보
    else {
      let ok=true;
      for(const k of keys){ const cv=GRID[k][i]; if(cv==null){ ok=false; break; }
        const val=cv/S[k], e=env[k]; if(val<e[0]||val>e[1]){ ok=false; break; } }
      if(!ok) continue;
      st=0; cNew++; numBySg.set(sg[i], (numBySg.get(sg[i])||0)+1);           // 신규후보(적합·미발견)
    }
    cells.push([lon[i]/S.lon, lat[i]/S.lat, st]);
  }
  const ratios=[];
  numBySg.forEach((num,sgi)=>{ const denom=GRID.sgn[sgi]||0, code=GRID.sgcodes[sgi];
    ratios.push({code, num, denom, ratio:denom?num/denom:0}); });
  return {gated:false, n, cells, ratios, counts:{new:cNew, old:cOld, recent:cRec}, cutoff};
}
function updateGapMap(res){                               // 후보셀 → Vector 소스(st별 사각형)
  if(!gapSource) return;
  gapSource.clear();
  if(res && !res.gated && res.cells && res.cells.length){
    gapSource.addFeatures(res.cells.map(([lo,la,st])=>{
      const f=new ol.Feature(new ol.geom.Point(ol.proj.fromLonLat([lo,la]))); f.set('st',st); return f; }));
  }
}
let gapSortDir=-1;                                        // 적합지 비율표 정렬(기본 비율 내림차순)
function gapTable(res){
  if(res.gated) return `<div id="gapHost"><span class="muted">관측 기록이 ${nf(res.n||0)}건으로 적어 환경적합 후보를 제공하지 않습니다(표본 부족).</span></div>`;
  const c=res.counts;
  if(!res.ratios.length) return `<div id="gapHost"><span class="muted">현재 조사자료 기준 새로운 환경적합 후보 지역이 없습니다.</span></div>`;
  const rows=res.ratios.map(r=>({...r,
    sido:shortSido(RNAME.sido[String(r.code).slice(0,2)]||''),
    sigungu:RNAME.sigungu[r.code]||r.code})).sort((a,b)=> (a.ratio-b.ratio)*gapSortDir || b.num-a.num);
  const body=rows.map(r=>`<tr onclick="zoomSigungu('${r.code}')" title="지도에서 이 시군구로 이동">`+
    `<td>${r.sido}</td><td>${r.sigungu}</td>`+
    `<td class="num">${(r.ratio*100).toFixed(1)}%</td></tr>`).join('');
  return `<div id="gapHost">`+
    `<div class="gaplegend">`+
      `<span class="lgi"><i style="background:${GAP_COL.new}"></i>신규후보 ${nf(c.new)}</span>`+
      `<span class="lgi"><i style="background:${GAP_COL.old}"></i>재발견후보 ${nf(c.old)}</span>`+
      `<span class="lgi"><i style="background:${GAP_COL.recent}"></i>최근발견 ${nf(c.recent)}</span>`+
      `<span class="muted">· 1km 격자</span></div>`+
    `<div class="regtbl-wrap"><table class="regtbl gaptbl"><thead><tr>`+
      `<th>시도</th><th>시군구</th>`+
      `<th onclick="gapSortDir*=-1;rerenderGap()" class="num" title="적합지 비율로 정렬">적합지 비율${gapSortDir<0?' ▼':' ▲'}</th>`+
    `</tr></thead><tbody>${body}</tbody></table></div>`+
    `<div class="regtbl-foot"><span class="muted">${nf(rows.length)}개 시군구 · 신규후보 ${nf(c.new)}셀 · 행 클릭=해당 시군구로 이동</span></div>`+
    `<div class="envnote">기존 발견지점의 환경범위(기후·고도·식생${GAPMETA._ndwi.has(selSpecies.k)?'·수분':''})와 맞고 아직 발견기록이 없는 1km 지역입니다. 실제 서식을 보장하지 않습니다.</div>`+
  `</div>`;
}
function rerenderGap(){ const h=document.getElementById('gapHost'); if(h&&GAPRES) h.outerHTML=gapTable(GAPRES); }
function zoomSigungu(code){                               // 표 행 클릭 → 해당 시군구로 지도 이동
  if(!map||!LAYERS.sigungu) return;
  if(regLevel!=='sigungu' && typeof setRegLevel==='function') setRegLevel('sigungu');
  const src=LAYERS.sigungu.getSource();
  const f=src.getFeatures().find(x=>x.get('code')===code);
  if(f){ map.getView().fit(f.getGeometry().getExtent(), {padding:[40,40,40,40], maxZoom:11}); }
}
function setSpView(v){                                    // 발견/미발견 토글
  if(spView===v) return; spView=v;
  document.querySelectorAll('.spview-tg [data-v]').forEach(b=>b.classList.toggle('on', b.dataset.v===v));
  renderSpView();
}
function renderSpView(){                                  // 우측 표 + 지도(발견 강조 ⇄ 후보셀) 전환
  const host=document.getElementById('spViewHost'); if(!host||!selSpecies) return;
  if(spView==='found'){
    GAPRES=null; host.innerHTML=speciesRegionTable(selSpecies);
    if(gapLayer) gapLayer.setVisible(false); updateGapMap(null); refreshSpeciesMap();
  } else {
    host.innerHTML='<span class="muted">환경적합 후보를 계산하는 중…</span>';
    const sp=selSpecies;
    ensureGap(()=>loadCells(sp.t, ()=>{
      if(spView!=='gap'||selSpecies!==sp) return;         // 그 사이 종·뷰 바뀌면 폐기
      const res=computeCandidate(sp); GAPRES=res;
      const h=document.getElementById('spViewHost'); if(h) h.innerHTML=gapTable(res);
      updateGapMap(res); refreshSpeciesMap();
    }));
  }
}

/* ═══════ 공유 지도(모드 A·B 재사용, setTarget 전환) ═══════ */
/* 발견공백 다색 램프: 초록(잘 조사됨)→노랑→빨강(주목). 방향은 metric 따라 반전 —
   공백(gap) 클수록·발견(found) 적을수록 빨강. 단색 대비 값 구간 시인성↑. */
const RYG=[[26,152,80],[254,224,139],[215,48,39]];     // green·yellow·red (RdYlGn 계열)
function ryg(s,a){                                      // s:0 초록 → .5 노랑 → 1 빨강
  s=s<0?0:s>1?1:s; const i=s<0.5?0:1, u=s<0.5?s/0.5:(s-0.5)/0.5, c=RYG[i], d=RYG[i+1], L=(x,y)=>Math.round(x+(y-x)*u);
  return `rgba(${L(c[0],d[0])},${L(c[1],d[1])},${L(c[2],d[2])},${a})`;
}
function rygScale(v){                                   // 값 v(현 metric)→램프 위치 s(발견은 반전)
  const t=DOM.max<=DOM.min?0:(v-DOM.min)/(DOM.max-DOM.min);
  return metric==='found'?1-t:t;
}
function colorFor(v){ return ryg(rygScale(v),0.82); }
function regLabel(txt){
  return new ol.style.Text({text:txt,font:'11px system-ui,sans-serif',
    fill:new ol.style.Fill({color:'#1b201d'}),stroke:new ol.style.Stroke({color:'#ffffff',width:2.4})});
}
function styleFn(feature){
  const code=feature.get('code');
  // 시군구는 252개라 전국 줌에선 라벨 생략(혼잡) → 줌인·선택 시에만 표시. 시도는 항상.
  const showLabel = regLevel==='sido' || (map&&map.getView().getZoom()>=8.5) || selSidos.has(code);
  const txt = showLabel ? regLabel(rname(code)) : undefined;
  if(mapMode==='B'){                                    // 선택 종 발견 지역 강조
    if(spView==='gap'){                                 // 미발견(후보셀) 뷰 = 경계는 채움없이 윤곽만(셀이 가려지지 않게)
      return new ol.style.Style({
        fill:new ol.style.Fill({color:'rgba(0,0,0,0)'}),
        stroke:new ol.style.Stroke({color:'#9aa39c', width:0.6}), text:txt});
    }
    const c=selRegions.get(code)||0, has=c>0;
    const t=selRegMax>0?Math.min(1,c/selRegMax):0;
    return new ol.style.Style({
      fill:new ol.style.Fill({color:has?`rgba(47,111,94,${(0.35+0.5*t).toFixed(2)})`:'rgba(206,211,206,0.30)'}),
      stroke:new ol.style.Stroke({color:has?'#2f6f5e':'#9aa39c', width:has?1.2:0.6}),   // 기본 경계=회색 얇게·발견만 accent
      text:txt});
  }
  const v=METRIC.get(code)||0, sel=selSidos.has(code);  // 모드 A choropleth
  return new ol.style.Style({
    fill:new ol.style.Fill({color:colorFor(v)}),
    stroke:new ol.style.Stroke({color:sel?'#2f6f5e':'#9aa39c', width:sel?1.4:0.6}),   // 시도·시군구 동일 회색 얇게·선택만 accent
    text:txt});
}
function initMap(){
  if(typeof ol==='undefined'){ mapMsg.textContent='지도 라이브러리를 불러오지 못했습니다(네트워크 확인).'; return; }
  const layers=[];
  // 배경: 항상 OSM 기본(키·도메인 불필요) → 외부 배포에서도 바로 표시.
  //       vworld 키가 있으면 그 위에 얹어 국내 상세지도를 쓰되, 타일이 반복 실패하면(도메인 미등록 등) vworld만 제거 → OSM 노출.
  layers.push(new ol.layer.Tile({source:new ol.source.OSM({crossOrigin:'anonymous'})}));
  if(KEY){
    const vsrc=new ol.source.XYZ({
      url:`https://api.vworld.kr/req/wmts/1.0.0/${KEY}/Base/{z}/{y}/{x}.png`,
      attributions:'© VWorld', crossOrigin:'anonymous', maxZoom:19});
    const vlayer=new ol.layer.Tile({source:vsrc});
    let tileErr=0;
    vsrc.on('tileloaderror',()=>{ if(++tileErr===4){       // vworld 실패 → OSM 폴백(외부엔 에러 노출 않고 조용히 전환)
      try{ map.removeLayer(vlayer); }catch(e){}
      console.warn(`vworld 타일 로드 실패(도메인 ${location.host} 미등록 가능) — OpenStreetMap 배경으로 전환.`); }});
    layers.push(vlayer);
  }
  initEnvLayers(layers);                                 // 환경변수 래스터(폴리곤 아래·배경 위)
  gapSource=new ol.source.Vector();                      // 발견공백 A 후보셀 — 경계보다 아래(Canvas2D Vector)
  const _gapSty={};                                      // st별 사각형 스타일 캐시(WebGLPoints 는 이 지도서 미합성 → Vector)
  for(const st of [0,1,2]) _gapSty[st]=new ol.style.Style({image:new ol.style.RegularShape({
    points:4, radius:3, angle:Math.PI/4,
    fill:new ol.style.Fill({color:_hexA(st===0?GAP_COL.new:st===1?GAP_COL.old:GAP_COL.recent, GAP_OPA[st])})})});
  gapLayer=new ol.layer.Vector({source:gapSource, visible:false,   // 상호작용 중 재렌더 안 함(기본) → 팬/줌 부드럽게
    style:f=>_gapSty[f.get('st')]||_gapSty[0]});
  layers.push(gapLayer);
  LAYERS.sido=new ol.layer.Vector({source:new ol.source.Vector(),style:styleFn});
  LAYERS.sigungu=new ol.layer.Vector({source:new ol.source.Vector(),style:styleFn,visible:false});
  sidoLayer=LAYERS.sido;
  layers.push(LAYERS.sido, LAYERS.sigungu);
  map=new ol.Map({target:'map',layers,controls:ol.control.defaults.defaults({attribution:true}),
    view:new ol.View({center:ol.proj.fromLonLat([127.8,36.1]),zoom:6.6,minZoom:5,maxZoom:12})});
  addRegToggle(); addEnvCtrl();
  Promise.all([
    fetch('demo/data/sido.geojson').then(r=>r.json()),
    fetch('demo/data/sigungu.geojson').then(r=>r.json())
  ]).then(([gjSido,gjSig])=>{
    const fmt=new ol.format.GeoJSON();
    for(const [lvl,gj,nmKey] of [['sido',gjSido,'sido'],['sigungu',gjSig,'sigungu']]){
      const feats=fmt.readFeatures(gj,{dataProjection:'EPSG:4326',featureProjection:'EPSG:3857'});
      LAYERS[lvl].getSource().addFeatures(feats);
      ACODES[lvl]=feats.map(f=>f.get('code'));
      feats.forEach(f=>{ RNAME[lvl][f.get('code')]=f.get(nmKey); });
    }
    SIDO_NAMES=ACODES[regLevel];
    mapMsg.style.display='none';
    if(DEEPLINK.sigungu){                                    // 딥링크 시군구: 레벨 전환→선택→해당 구역으로 확대
      setRegLevel('sigungu'); selSidos.add(DEEPLINK.sigungu);
      const ff=LAYERS.sigungu.getSource().getFeatures().find(x=>x.get('code')===DEEPLINK.sigungu);
      if(ff) map.getView().fit(ff.getGeometry().getExtent(),{padding:[50,50,50,50],maxZoom:10});
    }
    renderSelChips();                                        // 딥링크 선택(시도/시군구) 칩을 경계 로드 후 이름으로 재렌더
    loadTaxon(curTaxon, ()=>{ recompute(); sidoLayer.changed(); renderTable(); });
  }).catch(()=>{ mapMsg.textContent='경계 자료를 불러오지 못했습니다.'; });
  map.on('singleclick',e=>{
    if(mapMode!=='A') return;                            // 종별 모드 지도는 표시 전용
    let hit=false;
    map.forEachFeatureAtPixel(e.pixel,f=>{ const code=f.get('code'); if(code){ selSidos.has(code)?selSidos.delete(code):selSidos.add(code); hit=true; } return true; },
      {layerFilter:l=>l===sidoLayer});                   // 활성 레벨 레이어만 클릭 대상
    if(!hit) selSidos.clear();
    sidoLayer.changed(); renderSelChips(); renderTable();
  });
}
function addRegToggle(){                                  // 지도 안 컨트롤: 시도/시군구 레벨 토글 + 지역 경계 표시 토글

function applyLayerVis(){                                 // 활성 레벨만, 그리고 polyVisible 일 때만 폴리곤 표시
  if(LAYERS.sido) LAYERS.sido.setVisible(polyVisible && regLevel==='sido');
  if(LAYERS.sigungu) LAYERS.sigungu.setVisible(polyVisible && regLevel==='sigungu');
}
function setPolyVisible(v){                               // 시각화만 끄고 켜기 — 선택/필터 상태(selSidos·selRegions)는 보존
  polyVisible=v; applyLayerVis();

function setRegLevel(l){

/* 내 주변: 현재 위치(geolocation) → 포함 시군구 폴리곤 판정 → 해당 시군구 미발견(공백) 표출.
   위치는 클라이언트에서만 사용(전송·저장 없음), 기존 시군구 레벨/선택/확대 기계 재사용. */
function nearbyMsg(t,ok){ const el=document.getElementById('nearbyMsg'); if(el){ el.textContent=t||''; el.className='nearby-msg'+(ok?' ok':''); } }
function locateNearby(){
  const btn=document.getElementById('nearbyBtn');
  if(!('geolocation' in navigator)){ nearbyMsg('이 브라우저는 위치를 지원하지 않습니다.'); return; }
  if(!LAYERS.sigungu || !LAYERS.sigungu.getSource().getFeatures().length){ nearbyMsg('지도를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.'); return; }
  if(btn) btn.disabled=true; nearbyMsg('위치 확인 중…', true);
  navigator.geolocation.getCurrentPosition(pos=>{
    if(btn) btn.disabled=false;
    const coord=ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
    const hit=LAYERS.sigungu.getSource().getFeatures().find(f=>{ const g=f.getGeometry(); return g && g.intersectsCoordinate(coord); });
    if(!hit){ nearbyMsg('현재 위치가 국내 시군구 경계 밖입니다.'); return; }
    const code=hit.get('code');
    if(mapMode!=='A') setMode('A');
    setRegLevel('sigungu');                                 // 시군구 레벨(이미면 no-op)
    selSidos.clear(); selSidos.add(code);
    metric='gap'; mFound.classList.remove('on'); mGap.classList.add('on');   // 내 주변은 발견공백(미발견) 중심
    recompute(); renderSelChips(); renderTable(); if(sidoLayer) sidoLayer.changed();
    map.getView().fit(hit.getGeometry().getExtent(), {padding:[40,40,40,40], maxZoom:10});
    nearbyMsg(rname(code)+' 발견공백', true);
    window.fgTrack && fgTrack('nearby_locate');
  }, err=>{
    if(btn) btn.disabled=false;
    nearbyMsg(err && err.code===1 ? '위치 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.' : '위치를 가져오지 못했습니다.');
  }, {enableHighAccuracy:false, timeout:8000, maximumAge:60000});
}
function initEnvLayers(layers){                           // ImageStatic 오버레이(EPSG:3857) — 변수당 1장, 기본 숨김
  if(!ENVMETA||!ENVMETA.layers) return;
  for(const v of ENVMETA.vars){
    const L=ENVMETA.layers[v.key]; if(!L) continue;
    const img=new ol.layer.Image({visible:false, opacity:envOpacity,
      source:new ol.source.ImageStatic({url:'demo/data/'+L.png, imageExtent:L.extent, projection:'EPSG:3857'})});
    ENVLAYERS[v.key]=img; layers.push(img);
  }
}
function addEnvCtrl(){                                     // 지도 좌상단: 변수 선택 + 범례 + 투명도

function setEnvLayer(key){

/* ═══════ Mode A: 분류군별 조회 ═══════ */
function obsA(){ return (OBS[curTaxon]&&OBS[curTaxon].obs)||[]; }
function spA(){ return SP_BY_TAX[curTaxon]||[]; }
function years(){ return ((OBS[curTaxon]&&OBS[curTaxon].years)||[]).map(Number); }
function fillTaxonSel(){
  fTaxon.innerHTML=TAXA.map(t=>`<option value="${t.group}">${t.kor} (${nf(t.n_species)}종)</option>`).join('');
  fTaxon.value=curTaxon;
}
function fillYearSels(){
  const ys=years();
  if(!ys.length){ fY0.innerHTML=fY1.innerHTML='<option>—</option>'; fY0.disabled=fY1.disabled=true; return; }
  fY0.disabled=fY1.disabled=false;

  fY0.value=y0; fY1.value=y1;
}
function recompute(){
  const obs=obsA(), total=spA().length;
  const byReg=new Map();                                 // 활성 레벨 코드 → 발견 종 Set
  for(const [k,s,yy,c] of obs){ const rk=rkey(s); if(isUnknownReg(rk))continue; const y=+yy; if(y<y0||y>y1)continue;
    if(!byReg.has(rk))byReg.set(rk,new Set()); byReg.get(rk).add(k); }
  METRIC=new Map();
  const codes=SIDO_NAMES.length?SIDO_NAMES:[...byReg.keys()];
  for(const code of codes){ const f=(byReg.get(code)||new Set()).size; METRIC.set(code, metric==='found'?f:(total-f)); }
  const vals=[...METRIC.values()]; DOM={min:Math.min(0,...vals), max:Math.max(1,...vals)};
  legLo.textContent=nf(DOM.min); legHi.textContent=nf(DOM.max);
  const lvl=regLevel==='sido'?'시도별':'시군구별';
  const rampEl=document.querySelector('.ramp');          // 램프 방향도 metric 따라 반전(좌=legLo·우=legHi 값 색과 일치)
  if(rampEl) rampEl.style.background = metric==='found'
    ? `linear-gradient(90deg,${ryg(1,1)},${ryg(.5,1)},${ryg(0,1)})`   // 발견: 적음(빨강)→많음(초록)
    : `linear-gradient(90deg,${ryg(0,1)},${ryg(.5,1)},${ryg(1,1)})`;  // 공백: 작음(초록)→큼(빨강)
  legCap.textContent= metric==='found'?`${lvl} 발견 종수 — 초록 많음·빨강 적음`:`${lvl} 미발견(공백) — 빨강 큼·초록 작음`;
}
function renderSelChips(){
  if(!selSidos.size){ selChips.innerHTML=`<span class="muted">지도에서 ${regLevel==='sido'?'시도':'시군구'}를 클릭(폴리곤 밖 클릭=전체)</span>`; return; }
  selChips.innerHTML=[...selSidos].map(code=>`<span class="c">${rname(code)}</span>`).join('')+
    `<button class="clr" onclick="clearSel()">전체 해제</button>`;
}
function clearSel(){ selSidos.clear(); if(sidoLayer)sidoLayer.changed(); renderSelChips(); renderTable(); }

function tableRows(){
  const obs=obsA();
  const cnt=new Map();
  for(const [k,s,yy,c] of obs){ if(selSidos.size && !selSidos.has(rkey(s)))continue; const y=+yy; if(y<y0||y>y1)continue; cnt.set(k,(cnt.get(k)||0)+c); }
  const sp=spA();
  let rows=sp.map(x=>({k:x.k,n:x.n,s:x.s,g:x.g,r:x.r,c:cnt.get(x.k)||0,found:cnt.has(x.k),iv:interestOf(x.k)}));
  const egr=g=>g==='I'?0:g==='II'?1:2;
  rows.sort((a,b)=>{
    let d=0;
    if(sortKey==='c') d=a.c-b.c;
    else if(sortKey==='iv') d=a.iv-b.iv;                 // 내림차순=관심도 높은 종 먼저
    else if(sortKey==='g') d=egr(b.g)-egr(a.g);          // 내림차순=I급 먼저
    else if(sortKey==='r') d=rlr(b.r)-rlr(a.r);          // 내림차순=EX(심각) 먼저
    else d=String(a[sortKey]||'').localeCompare(String(b[sortKey]||''),'ko');
    return d*sortDir || (b.iv-a.iv) || (a.n||a.s).localeCompare(b.n||b.s,'ko');  // 동순위는 관심도↑ 먼저(미발견 목록서 주목종 상단)
  });
  return rows;
}
function renderRecStrip(all){                              // 주목할 미발견 종: 이 범위에서 미기록 + 관심도 상위
  const el=document.getElementById('recStrip'); if(!el)return;
  const top=all.filter(r=>!r.found && r.iv>0).sort((a,b)=> b.iv-a.iv || (a.n||a.s).localeCompare(b.n||b.s,'ko')).slice(0,6);
  if(top.length<2){ el.hidden=true; el.innerHTML=''; return; }
  const reg=selSidos.size?[...selSidos].map(rname).join('·'):'전국';
  const chips=top.map(x=>{
    const nm=x.n?`<span class="rc-n">${x.n}</span>`:`<span class="rc-n"><span class="sci">${x.s}</span></span>`;
    const p=Math.round(x.iv*100);
    return `<button class="rec-chip" onclick="openSpecies('${x.k}')" title="${x.n?x.n+' · ':''}${x.s} — 관심도 ${p}, ${reg} 미발견 · 종별 검색으로 보기 →">`+
      `${nm}<span class="rc-iv" aria-hidden="true"><span style="width:${p}%"></span></span></button>`;
  }).join('');
  const tip=(reg+'에서 아직 기록 없는 관심도 높은 종').replace(/"/g,'&quot;');
  el.innerHTML=`<div class="rec-h">주목할 미발견 종 <button type="button" class="qtip" aria-label="설명 보기" data-tip="${tip}">?</button></div><div class="rec-chips">${chips}</div>`;
  el.hidden=false;
}
// 물음표 툴팁: 모바일 탭 토글 + 외부 클릭 시 닫기(데스크톱은 호버·포커스로 표출)
document.addEventListener('click',function(e){
  const q=e.target.closest('.qtip');
  document.querySelectorAll('.qtip.on').forEach(x=>{ if(x!==q) x.classList.remove('on'); });
  if(q){ e.preventDefault(); const open=!q.classList.contains('on'); q.classList.toggle('on'); if(!open)q.blur(); }
});
function renderTable(){
  const all=tableRows();
  renderRecStrip(all);
  const foundN=all.filter(r=>r.found).length, gapN=all.length-foundN;
  const rows= metric==='found' ? all.filter(r=>r.found) : all.filter(r=>!r.found);   // 토글로 발견/미발견만 표시
  tblCnt.textContent=`발견 ${nf(foundN)} · 미발견 ${nf(gapN)} / 총 ${nf(all.length)}종 — 표시: ${metric==='found'?'발견':'미발견'} ${nf(rows.length)}종`;
  const ar=k=>sortKey===k?`<span class="ar on">${sortDir<0?'▼':'▲'}</span>`:`<span class="ar off">↕</span>`;
  const head=`<thead><tr>
    <th scope="col" onclick="sortBy('n')" title="국명으로 정렬">국명${ar('n')}</th>
    <th scope="col" onclick="sortBy('s')" title="학명으로 정렬">학명${ar('s')}</th>
    <th scope="col" onclick="sortBy('g')" title="멸종위기 야생생물 등급으로 정렬(I급 먼저)">멸종위기종${ar('g')}</th>
    <th scope="col" onclick="sortBy('r')" title="국가적색목록 범주로 정렬(심각도 순)">국가적색목록${ar('r')}</th>
    <th scope="col" onclick="sortBy('iv')" class="num" title="관심도로 정렬 — 분류군·희소도 층 내 백분위(관측·한국어 위키·관심종)">관심도${ar('iv')}</th>
    <th scope="col" onclick="sortBy('c')" class="num" title="관측 수로 정렬">관측${ar('c')}</th></tr></thead>`;
  const shown=rows.slice(0,ROWCAP);
  const body=shown.map(x=>
    `<tr class="rowlink" onclick="openSpecies('${x.k}')" title="종별 검색으로 보기 →">`+
      `<td title="${(x.n||x.s).replace(/"/g,'&quot;')}">${x.n||'<span class="sci">'+x.s+'</span>'}</td><td title="${x.s.replace(/"/g,'&quot;')}"><span class="sci">${x.s}</span></td>`+
      `<td>${egBadge(x.g)}</td><td>${rlBadge(x.r)}</td><td class="num ivcell">${ivCell(x.iv)}</td><td class="num">${x.c||''}</td></tr>`
  ).join('');
  const more=rows.length>ROWCAP
    ? `<tr><td colspan="6" style="padding:10px;color:#888;background:#fbfbfa;white-space:normal">상위 ${nf(ROWCAP)}행만 표시 — 전체 ${nf(rows.length)}종은 CSV 다운로드로 확인하세요.</td></tr>`
    : '';
  tbl.innerHTML=head+'<tbody>'+body+more+'</tbody>';
}
function sortBy(k){ if(sortKey===k)sortDir*=-1; else {sortKey=k;sortDir=(k==='n'||k==='s')?1:-1;} renderTable(); }

function downloadCSV(){
  const all=tableRows();
  const rows= metric==='found' ? all.filter(r=>r.found) : all.filter(r=>!r.found);   // 화면 필터와 동일
  const head=['국명','학명','멸종위기등급','적색목록','관심도','관측수'];

  const csv='﻿'+[head.join(','),...body].join('\r\n');

}

/* ═══════ Mode B: 종별 검색(분류군·연도 필터 + 지도) ═══════ */
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function toCho(str){ let o=''; for(const ch of str){ const c=ch.charCodeAt(0)-0xAC00; o+=(c>=0&&c<11172)?CHO[Math.floor(c/588)]:ch; } return o; }
function fillSearchTaxon(){
  sTaxon.innerHTML='<option value="">전체 분류군</option>'+TAXA.map(t=>`<option value="${t.group}">${t.kor}</option>`).join('');
  sTaxon.value=sTax;
}
function searchYears(){ return (sTax&&OBS[sTax])?OBS[sTax].years.map(Number):ALL_YEARS; }
function fillSearchYears(){
  const ys=searchYears();
  if(!ys.length){ sY0.innerHTML=sY1.innerHTML='<option>—</option>'; sY0.disabled=sY1.disabled=true; return; }
  sY0.disabled=sY1.disabled=false;
  sY0.innerHTML=ys.map(y=>`<option>${y}</option>`).join('');
  sY1.innerHTML=ys.map(y=>`<option>${y}</option>`).join('');
  if(sy0==null||!ys.includes(sy0))sy0=ys[0]; if(sy1==null||!ys.includes(sy1))sy1=ys[ys.length-1];
  sY0.value=sy0; sY1.value=sy1;
}
function speciesRegions(sp,a,b){
  const m=new Map(), rows=(OBS[sp.t]&&OBS[sp.t].obs)||[];
  for(const [k,s,yy,c] of rows){ if(k!==sp.k)continue; const y=+yy; if(y<a||y>b)continue; const rk=rkey(s); m.set(rk,(m.get(rk)||0)+c); }
  return m;
}
function doSearch(){
  const raw=q.value.trim();
  if(!raw){ sResults.style.display='none'; sCount.textContent=''; return; }
  const ql=raw.toLowerCase();
  const isCho=/^[ㄱ-ㅎ]+$/.test(raw);     // 초성쿼리일 때만 초성매칭(전체 한글엔 오매칭 방지)
  const pool=sTax?(SP_BY_TAX[sTax]||[]):SPIDX;
  const scored=[];
  for(const sp of pool){
    const nl=(sp.n||'').toLowerCase(), sl=(sp.s||'').toLowerCase();
    let sc=-1;
    if(isCho){ const cn=toCho(sp.n||''); if(cn.startsWith(raw))sc=0; else if(cn.includes(raw))sc=2; }
    else { if(nl.startsWith(ql))sc=0; else if(sl.startsWith(ql))sc=1; else if(nl.includes(ql))sc=2; else if(sl.includes(ql))sc=3; }
    if(sc>=0) scored.push([sc,sp]);
  }
  scored.sort((a,b)=>a[0]-b[0] || (a[1].n||a[1].s).localeCompare(b[1].n||b[1].s,'ko'));
  const total=scored.length;
  SRES=scored.slice(0,60).map(x=>x[1]);
  sCount.textContent=`${nf(total)}${total>60?' · 상위 60 표시':''}건`;
  sResults.style.display='';
  sResults.innerHTML=SRES.length?SRES.map((sp,i)=>
    `<div class="r" onclick="showIdx(${i})">`+
    `<span class="nm">${sp.n||'<span class=sci>'+sp.s+'</span>'}</span> <span class="sci">${sp.s}</span>`+
    `<span class="tg">${TAXON_KOR[sp.t]||sp.t}</span></div>`).join('')
    :'<div class="r" style="cursor:default;color:#999">검색 결과가 없습니다.</div>';
}
function showIdx(i){ if(SRES[i]) showSpecies(SRES[i]); }
function refreshSpeciesMap(){
  const vals=[...selRegions.entries()].filter(([c])=>!isUnknownReg(c)).map(([,c])=>c);
  selRegMax=vals.length?Math.max(...vals):0;
  const hit=[...selRegions.keys()].filter(c=>!isUnknownReg(c)).length;
  const gapOn=mapMode==='B' && spView==='gap' && !!selSpecies;
  if(gapLayer) gapLayer.setVisible(gapOn);
  if(legCapB){
    if(gapOn && GAPRES && !GAPRES.gated){ const c=GAPRES.counts;
      legCapB.textContent=`${selSpecies.n||selSpecies.s} · 신규후보 ${nf(c.new)} · 재발견후보 ${nf(c.old)} · 최근발견 ${nf(c.recent)} (1km)`; }
    else legCapB.textContent=selSpecies?`${selSpecies.n||selSpecies.s} · ${sy0}–${sy1} 발견 ${regLevel==='sido'?'시도':'시군구'} ${hit}곳`:'';
  }
  if(mapMsgB) mapMsgB.style.display=selSpecies?'none':'';
  if(mapMode==='B'&&sidoLayer) sidoLayer.changed();
}
function showSpecies(sp){                                // 선택 종의 분류군 obs 를 보장 로드 후 렌더
  if(!taxonReady(sp.t)||!window.__ENV__) sCard.innerHTML='<div class="scard"><span class="muted">관측자료 불러오는 중…</span></div>';
  ensureEnv(()=>loadTaxon(sp.t, ()=>renderSpecies(sp)));
}
function speciesSigungu(sp,a,b){                          // 종 obs → 시군구 단위 [{sido명, 시군구명, 발견수}] (토글 무관·항상 시군구)
  const m=new Map(), rows=(OBS[sp.t]&&OBS[sp.t].obs)||[];
  for(const [k,s,yy,c] of rows){ if(k!==sp.k)continue; const y=+yy; if(y<a||y>b)continue; m.set(s,(m.get(s)||0)+c); }
  return [...m.entries()].map(([sg,c])=>{
    const u=isUnknownReg(sg);
    return {sg, sido:u?'좌표미상':(RNAME.sido[String(sg).slice(0,2)]||''), sigungu:u?'—':(RNAME.sigungu[sg]||sg), c};
  }).sort((x,y)=> y.c-x.c || x.sido.localeCompare(y.sido,'ko'));
}
function regSortRows(rows){                               // 발견지역 표 정렬 상태 적용
  const r=rows.slice();
  r.sort((a,b)=>{
    let d = regSortKey==='c' ? a.c-b.c
          : String(a[regSortKey]||'').localeCompare(String(b[regSortKey]||''),'ko');
    return d*regSortDir || b.c-a.c || a.sido.localeCompare(b.sido,'ko');
  });
  return r;
}
function sortRegBy(k){                                    // 헤더 클릭 → 정렬(같은 열 재클릭=방향 반전)
  if(regSortKey===k) regSortDir*=-1;
  else { regSortKey=k; regSortDir=(k==='c')?-1:1; }      // 수치=내림차순 먼저, 텍스트=오름차순 먼저
  const host=document.getElementById('regHost');
  if(host && selSpecies) host.outerHTML=speciesRegionTable(selSpecies);
}
function speciesRegionTable(sp){
  const rows=regSortRows(speciesSigungu(sp,sy0,sy1));
  if(!rows.length) return `<div id="regHost"><span class="muted">${sy0}–${sy1} 조사자료에서 관측 기록이 없습니다(발견공백).</span></div>`;
  const total=rows.reduce((s,r)=>s+r.c,0);
  const ar=k=>regSortKey===k?`<span class="ar on">${regSortDir<0?'▼':'▲'}</span>`:`<span class="ar off">↕</span>`;
  const body=rows.map(r=>`<tr><td>${r.sido}</td><td>${r.sigungu}</td><td class="num">${nf(r.c)}</td></tr>`).join('');
  return `<div id="regHost"><div class="regtbl-wrap"><table class="regtbl"><thead><tr>`+
      `<th onclick="sortRegBy('sido')" title="시도명으로 정렬">시도${ar('sido')}</th>`+
      `<th onclick="sortRegBy('sigungu')" title="시군구명으로 정렬">시군구${ar('sigungu')}</th>`+
      `<th onclick="sortRegBy('c')" class="num" title="발견수로 정렬">발견수${ar('c')}</th></tr></thead>`+
      `<tbody>${body}</tbody></table></div>`+
    `<div class="regtbl-foot"><span class="muted">${nf(rows.length)}개 시군구 · 합계 ${nf(total)}</span>`+
    `<button class="rdl" onclick="downloadSpeciesRegions()">CSV 다운로드</button></div></div>`;
}
function downloadSpeciesRegions(){
  if(!selSpecies) return;
  const rows=regSortRows(speciesSigungu(selSpecies,sy0,sy1));   // 화면에 보이는 정렬 순서대로 내보내기
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const head=['종명','학명','시도','시군구','발견수'];
  const body=rows.map(r=>[selSpecies.n,selSpecies.s,r.sido,r.sigungu,r.c].map(esc).join(','));
  const csv='﻿'+[head.join(','),...body].join('\r\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`${selSpecies.n||selSpecies.s}_발견지역(시군구)_${sy0}-${sy1}.csv`; a.click(); URL.revokeObjectURL(a.href);
}
function envBars(sp){                                     // 발견지점 기후·고도 박스플롯(Q1–Q3 집중구간) + 평균±표준편차
  if(!ENVMETA||!window.__ENV__) return '';               // 메타·데이터 준비 안 됨 → 섹션 생략
  const row=window.__ENV__[sp.k]; if(!row) return '';
  const vars=ENVMETA.vars, ref=ENVMETA.ref, NV=7; let bars='';   // 변수당 [min,q1,median,q3,max,mean,sd]
  for(let i=0;i<vars.length;i++){
    const v=vars[i], R=ref[v.key]; if(!R) continue;
    const b=i*NV, mn=row[b], q1=row[b+1], md=row[b+2], q3=row[b+3], mx=row[b+4], mean=row[b+5], sd=row[b+6];
    if(mn==null||mx==null) continue;
    const t0=R.p01, t1=R.p99, span=(t1-t0)||1;
    const pc=x=>Math.max(0,Math.min(100,((x-t0)/span)*100));
    const wl=pc(mn), wr=pc(mx);                           // 수염: min–max 전체 범위
    let bl=pc(q1), br=pc(q3); if(br-bl<2){ const c=(bl+br)/2; bl=Math.max(0,c-1); br=Math.min(100,c+1); }  // 박스: Q1–Q3
    const sdTxt=(sd!=null&&sd>0)?` ± ${fmtVal(sd,v)}`:'';
    bars+=`<div class="envrow"><span class="lbl">${v.label}</span>`+
      `<div class="envtrack" title="전국 ${fmtVal(t0,v)}–${fmtVal(t1,v)}${v.unit} · 전국 중앙값 ${fmtVal(R.median,v)} · 이 종 Q1–Q3 ${fmtVal(q1,v)}–${fmtVal(q3,v)} · 중앙값 ${fmtVal(md,v)}">`+
        `<div class="whisk" style="left:${wl.toFixed(1)}%;width:${(wr-wl).toFixed(1)}%"></div>`+
        `<div class="seg" style="left:${bl.toFixed(1)}%;width:${(br-bl).toFixed(1)}%"></div>`+
        `<div class="smed" style="left:${pc(md).toFixed(1)}%"></div>`+
        `<div class="nmed" style="left:${pc(R.median).toFixed(1)}%"></div></div>`+
      `<span class="val"><b>${fmtVal(mean,v)}</b>${sdTxt} ${v.unit}</span></div>`;
  }
  if(!bars) return '';
  const head=`<div class="envhead"><span class="vh">평균 ± 표준편차</span></div>`;   // 값 컬럼 위 헤더
  const legend=`<div class="envlegend foot">`+                                       // 막대 하단 도형 범례
    `<span class="lgi"><i class="lg-area"></i>전국 분포</span>`+
    `<span class="lgi"><i class="lg-ncirc"></i>전국 중앙값</span>`+
    `<span class="lgi"><i class="lg-range"></i>종 발견 범위</span>`+
    `<span class="lgi"><i class="lg-box"></i>집중 구간(Q1–Q3)</span>`+
    `<span class="lgi"><i class="lg-smed"></i>발견 지점 중앙값</span></div>`;
  return head + `<div class="envbars">${bars}</div>` + legend +
    `<div class="envnote">발견 기록이 있는 지점의 환경값 분포 — 실제 분포역과 다를 수 있습니다.</div>`;
}
function renderSpecies(sp){
  selSpecies=sp;
  window.fgTrack&&fgTrack('species_open',{ktsn:sp.k,taxon:sp.t});
  selRegions=speciesRegions(sp,sy0,sy1);                  // 지도 강조용(활성 레벨)
  const eg=isEndangered(sp.g);
  const envHtml=envBars(sp);                              // 기후·지형 지위 막대(데이터 있을 때만)
  const envRow=envHtml?`<div class="row"><div class="k khead">발견지점 기후 및 고도</div>${envHtml}</div>`:'';
  const reportLink=eg
    ? `<a class="lk danger" href="${NATURING}" target="_blank" rel="noopener noreferrer"><span><span class="t">Naturing 멸종위기종 제보</span><br><span class="d">시민과학 관찰 제보 프로젝트 →</span></span></a>`
    : `<a class="lk" href="${ECOBANK}" target="_blank" rel="noopener noreferrer"><span><span class="t">EcoBank 데이터 제보</span><br><span class="d">국립생태원 생태정보 제보 →</span></span></a>`;
  sCard.innerHTML=`<div class="scard">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="min-width:0"><h3>${sp.n||sp.s}</h3><div class="sci">${sp.s}</div></div>
      <button class="watchbtn" data-k="${sp.k}" style="margin-left:auto" hidden>☆ 관심 종</button>
    </div>
    <div style="margin-top:8px">${badges(sp.g,sp.r)||'<span class="muted">일반종</span>'} <span class="badge" style="background:#eef3f1;color:#2f6f5e">${TAXON_KOR[sp.t]||sp.t}</span></div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px" title="같은 분류군·희귀도 그룹 안에서 이 종에 대한 대중 관심(관측 기록·한국어 위키 조회 기반)의 상대 위치">
      <span class="muted" style="font-size:12px;white-space:nowrap">관심도</span>
      <span style="flex:1;max-width:150px;height:6px;background:#eef1f0;border-radius:3px;overflow:hidden"><span style="display:block;height:100%;width:${Math.round(interestOf(sp.k)*100)}%;background:#6a9a86"></span></span>
      <span class="muted" style="font-size:12px">${Math.round(interestOf(sp.k)*100)}<span style="font-size:10px">/100</span></span></div>
    <div class="row"><div class="k khead" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span>분포 · ${sy0}–${sy1}</span>
        <span class="spview-tg">
          <button data-v="found" class="${spView==='found'?'on':''}">발견 지역</button>
          <button data-v="gap" class="${spView==='gap'?'on':''}">미발견 후보</button>
        </span></div>
      <div id="spViewHost"></div></div>
    ${envRow}
    <div class="row"><div class="k">상세 정보 · 데이터 제보</div>
      <div class="links">
        <a class="lk primary" href="${NIBR(sp.k)}" target="_blank" rel="noopener noreferrer"><span><span class="t">한반도의 생물다양성</span><br><span class="d">국립생물자원관 종 상세 →</span></span></a>
        <a class="lk report-lk" data-k="${sp.k}" role="button" tabindex="0" hidden><span><span class="t">이 곳에서 발견 제보</span><br><span class="d">관찰 위치·근거 URL로 발견공백 메우기 →</span></span></a>
        ${reportLink}
        ${(((window.__SPMEDIA_META__||{}).taxa||{})[sp.t]>=4)?`<a class="lk" href="quiz.html?mode=species&ktsn=${sp.k}"><span><span class="t">이 종 동정 연습</span><br><span class="d">유사종 사진과 비교하는 퀴즈 →</span></span></a>`:''}
      </div>
      <div class="muted" style="margin-top:8px">${eg?'멸종위기 야생생물 — 관찰 시 Naturing 제보 프로젝트로':'일반종 — 관찰 자료는 EcoBank로 제보'}</div>
    </div>
  </div>`;
  sCard.querySelectorAll('.spview-tg [data-v]').forEach(b=>{ b.onclick=()=>setSpView(b.dataset.v); });
  renderSpView();                                        // 현재 뷰(발견/미발견)로 우측 표 + 지도
  if(window.fgWatch) window.fgWatch.decorate(sp.k);     // 관심 종 ☆ 버튼(로그인 시 활성)
  if(window.fgReport) window.fgReport.decorateCard(sp); // 발견 제보 버튼(Supabase 설정 시 노출)
  if(window.innerWidth<=880) sCard.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function clearSelSpecies(){ selSpecies=null; selRegions=new Map(); GAPRES=null;
  if(gapLayer)gapLayer.setVisible(false); if(gapSource)gapSource.clear();
  sCard.innerHTML=''; refreshSpeciesMap(); }

/* 분류군별 조회 테이블의 종 클릭 → 종별 검색(Mode B)으로 전환 + 해당 종 카드 표시 */
function openSpecies(k){
  const sp=(SP_BY_TAX[curTaxon]||[]).find(x=>x.k===k);
  if(!sp) return;
  setMode('B');
  sTax=''; if(window.sTaxon){ sTaxon.value=''; }          // 전체 분류군 검색 상태로
  fillSearchYears();                                       // sy0/sy1 채움(showSpecies가 사용)
  if(window.q){ q.value=sp.n||sp.s; doSearch(); }          // 검색창·결과 목록도 동기화
  showSpecies(sp);
  if(window.sCard) sCard.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── 모드 전환 ── */
function setMode(m){
  mapMode=m;
  window.fgTrack&&fgTrack('mode_switch',{mode:m});
  tabA.classList.toggle('on',m==='A'); tabB.classList.toggle('on',m==='B');
  modeA.style.display=m==='A'?'':'none'; modeB.style.display=m==='B'?'':'none';
  if(gapLayer) gapLayer.setVisible(m==='B' && spView==='gap' && !!selSpecies);   // 후보셀은 종별 미발견 뷰에서만
  if(map){ map.setTarget(m==='A'?'map':'mapB'); setTimeout(()=>{ map.updateSize(); sidoLayer&&sidoLayer.changed(); },30); }
}
function setMetric(m){ metric=m; mFound.classList.toggle('on',m==='found'); mGap.classList.toggle('on',m==='gap');
  recompute(); if(sidoLayer)sidoLayer.changed(); renderTable(); }   // 지도 metric + 테이블 필터 동시 전환

/* ── 부트 ── */
function boot(){
  curTaxon=(TAXA[0]&&TAXA[0].group)||'MM';
  // 딥링크 ?taxon&sido&y0&y1 (모드 A)
  const p=new URLSearchParams(location.search);
  if(p.get('taxon')&&TAXA.some(t=>t.group===p.get('taxon'))) curTaxon=p.get('taxon');
  // 모드 A 컨트롤
  fillTaxonSel(); fillYearSels();
  if(p.get('y0')&&years().includes(+p.get('y0'))) y0=+p.get('y0');
  if(p.get('y1')&&years().includes(+p.get('y1'))) y1=+p.get('y1');
  fY0.value=y0; fY1.value=y1;
  const qs=p.get('sido'), qsg=p.get('sigungu');
  if(qsg && /^\d{5}$/.test(qsg)) DEEPLINK.sigungu=qsg;       // 시군구 딥링크: 레이어 로드 후 반영(레벨 전환+선택+확대)
  else if(qs) selSidos.add(qs);                              // 시도 딥링크(기존)
  if(p.get('metric')==='gap'){ metric='gap'; mFound.classList.remove('on'); mGap.classList.add('on'); }
  fTaxon.onchange=()=>{ curTaxon=fTaxon.value; y0=null;y1=null; fillYearSels(); selSidos.clear(); renderSelChips();
    tblCnt.textContent='관측자료 불러오는 중…';
    loadTaxon(curTaxon, ()=>{ recompute(); if(sidoLayer)sidoLayer.changed(); renderTable(); }); };
  fY0.onchange=()=>{ y0=+fY0.value; if(y1<y0){y1=y0;fY1.value=y1;} recompute(); if(sidoLayer)sidoLayer.changed(); renderTable(); };
  fY1.onchange=()=>{ y1=+fY1.value; if(y1<y0){y0=y1;fY0.value=y0;} recompute(); if(sidoLayer)sidoLayer.changed(); renderTable(); };
  dlCsv.onclick=downloadCSV;
  { const nb=document.getElementById('nearbyBtn'); if(nb) nb.onclick=locateNearby; }
  // 모드 B 컨트롤
  fillSearchTaxon(); fillSearchYears();
  sTaxon.onchange=()=>{ sTax=sTaxon.value; sy0=null;sy1=null; fillSearchYears();
    if(selSpecies&&sTax&&selSpecies.t!==sTax) clearSelSpecies();
    else if(selSpecies) showSpecies(selSpecies);
    doSearch(); };
  sY0.onchange=()=>{ sy0=+sY0.value; if(sy1<sy0){sy1=sy0;sY1.value=sy1;} if(selSpecies)showSpecies(selSpecies); };
  sY1.onchange=()=>{ sy1=+sY1.value; if(sy1<sy0){sy0=sy1;sY0.value=sy0;} if(selSpecies)showSpecies(selSpecies); };
  q.addEventListener('input',doSearch);
  // 초기 렌더(관측자료는 선택 분류군만 지연 로드)
  renderSelChips();
  tblCnt.textContent='관측자료 불러오는 중…';
  loadTaxon(curTaxon, ()=>{ recompute(); renderTable(); if(sidoLayer)sidoLayer.changed(); });
  initMap();
  foot.innerHTML=`배경지도 © VWorld / © OpenStreetMap 기여자 · 종 상세 © 국립생물자원관 한반도의 생물다양성 · 출처 ${OMETA.citation||'KTSN·EcoBank·국립공원'}<br>`+
    `${TAXA.length}개 분류군 · 생성 ${OMETA.generated||'-'} · 종 검색 ${nf(SPIDX.length)}종 · 갱신주기 ${OMETA.update_cycle==='6mo'?'6개월':(OMETA.update_cycle||'6개월')}. 발견공백 = 국가생물종목록 − 관측(동적).`;
  if(p.get('taxon')||p.get('sido')||p.get('sigungu')) setMode('A');
  // 딥링크 ?sp=<ktsn> — 마이데이터 관심 종에서 진입(모드 B로 해당 종 카드 열기)
  const spk=p.get('sp');
  if(spk){ const sp=SPIDX.find(x=>x.k===spk);
    if(sp){ setMode('B'); if(window.sTaxon){sTaxon.value='';sTax='';} if(window.q){q.value=sp.n||sp.s; doSearch();} showSpecies(sp);
      // 챗 딥링크 액션: ?report=1 → 제보 모달 자동 오픈(해당 종 미리 선택). 처리는 로드 순서상 뒤의 제보 모듈이 담당.
      if(p.get('report')==='1') window.FG_ACTION={sp:spk, act:'report'};
    } }
}
boot();
</script>

<!-- 관심 종(watchlist) — Supabase 설정이 있을 때만 종 카드에 ☆ 버튼 활성 -->
<script type="module">
import { configured, onAuth, getUser, watchList, watchAdd, watchRemove } from './fg_supabase.js';
let user=null; const W=new Set();
function decorate(ktsn){
  const b=document.querySelector('.watchbtn[data-k="'+(window.CSS&&CSS.escape?CSS.escape(ktsn):ktsn)+'"]');
  if(!b) return;
  if(!configured){ b.hidden=true; return; }
  b.hidden=false;
  const on=W.has(ktsn);
  b.textContent = user ? (on?'★ 관심 종':'☆ 관심 종 추가') : '☆ 관심 종';
  b.classList.toggle('on', on);
  b.onclick=async()=>{
    if(!user){ location.href='index.html#my'; return; }       // 로그인 필요 → 마이데이터
    b.disabled=true;
    try{ if(W.has(ktsn)){ await watchRemove(ktsn); W.delete(ktsn); } else { await watchAdd(ktsn); W.add(ktsn); } }
    catch(e){ console.warn('관심 종 토글 실패', e); }
    b.disabled=false; decorate(ktsn);
  };
}
function refresh(){ const b=document.querySelector('.watchbtn'); if(b) decorate(b.dataset.k); }
window.fgWatch={ configured, decorate };
if(configured) onAuth(u=>{ user=u; W.clear();
  if(user) watchList().then(ks=>{ks.forEach(k=>W.add(k)); refresh();}).catch(refresh);
  else refresh();
});
</script>

<!-- 발견 제보(Feature B) — 종·지도 핀·URL·발견일 → reports 테이블(본인 RLS). 미설정/미로그인 graceful. -->
<script type="module">
import { configured, onAuth, submitReport, uploadReportPhoto } from './fg_supabase.js';
import exifr from 'https://esm.sh/exifr@7';
const SPIDX = window.__SPIDX__ || [];
const overlay = document.getElementById('rptOverlay');
const body = document.getElementById('rptBody');
let user = null, selSp = null, latlon = null, rptMap = null, pinSrc = null;
let photoFile = null, photoBlob = null;                 // 업로드용 압축 사진(blob) + 원본(EXIF 읽기용)

function todayStr(){ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// 종 카드의 '이 곳에서 발견 제보' 버튼 노출·배선(Supabase 설정 시)
function decorateCard(sp){
  const b=document.querySelector('.report-lk[data-k="'+(window.CSS&&CSS.escape?CSS.escape(sp.k):sp.k)+'"]');
  if(!b) return;
  if(!configured){ b.hidden=true; return; }
  b.hidden=false;
  b.onclick=()=>open(sp);
  b.onkeydown=(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(sp); } };
}

function open(prefill){
  selSp = prefill ? {k:prefill.k,n:prefill.n,s:prefill.s,t:prefill.t,g:prefill.g} : null;
  latlon = null;
  photoFile = null; photoBlob = null;
  overlay.hidden = false;
  document.body.style.overflow='hidden';
  render();
}
function close(){
  overlay.hidden = true;
  document.body.style.overflow='';
  if(location.hash==='#report'){ history.replaceState(null,'',location.pathname+location.search); }
}

function render(){
  if(!configured){ body.innerHTML='<div class="rpt-gate"><p>제보 기능이 아직 활성화되지 않았습니다.</p></div>'; return; }
  if(!user){
    body.innerHTML='<div class="rpt-gate"><p>발견 제보는 로그인 후 이용할 수 있습니다.<br>관심 종 저장·내 제보 이력도 함께 제공됩니다.</p>'+
      '<a class="go" href="index.html#my">로그인하러 가기</a></div>';
    return;
  }
  const eg = selSp && (selSp.g==='I'||selSp.g==='II');
  body.innerHTML =
    '<div class="rpt-f" id="rptSpWrap"></div>'+
    (eg?'<div class="rpt-hint" style="margin:-6px 0 12px;color:#a06a1a">멸종위기 야생생물 — 정확한 위치는 공개 피드에 노출되지 않습니다.</div>':'')+
    '<div class="rpt-f"><label>발견 위치 <span class="req">*</span> — 사진에 위치정보(GPS)가 있으면 자동 입력, 지도를 클릭해 수정</label>'+
      '<div class="rpt-map" id="rptMap"></div><div class="rpt-coord" id="rptCoord"></div></div>'+
    '<div class="rpt-f"><label>발견일 <span class="req">*</span></label><input type="date" id="rptDate" max="'+todayStr()+'" value="'+todayStr()+'"></div>'+
    '<div class="rpt-f"><label>관찰 사진 <span class="req">*</span></label>'+
      '<input type="file" id="rptPhoto" accept="image/*" capture="environment">'+
      '<div class="rpt-photo-prev" id="rptPhotoPrev" hidden><img id="rptPhotoImg" alt=""><button type="button" id="rptPhotoClear">✕ 제거</button></div>'+
      '<div class="rpt-hint" id="rptPhotoHint" style="margin-top:6px"></div>'+
      '<span class="rpt-url-toggle" id="rptUrlToggle">사진이 없다면 URL로 제보 →</span>'+
      '<div id="rptUrlWrap" hidden style="margin-top:8px"><input type="url" id="rptUrl" placeholder="https://... (관찰기록 링크)" inputmode="url"></div></div>'+
    '<div class="rpt-f"><label>메모 (선택)</label><textarea id="rptNote" placeholder="개체수·서식환경 등"></textarea></div>'+
    '<button class="rpt-submit" id="rptSubmit" type="button">제보 등록</button>'+
    '<div class="rpt-msg" id="rptMsg"></div>';
  renderSp();
  initMap();
  const su=document.getElementById('rptSubmit');
  su.onclick=doSubmit;
  document.getElementById('rptPhoto').addEventListener('change', onPhotoChange);
  document.getElementById('rptPhotoClear').onclick = clearPhoto;
  document.getElementById('rptUrlToggle').onclick = toggleUrlField;
  ['rptUrl','rptDate'].forEach(id=>document.getElementById(id).addEventListener('input',updateSubmit));
  updateSubmit();
}

// ── 사진: EXIF GPS 자동 위치 + 클라이언트 압축(원본 EXIF는 재인코딩 시 제거됨) ──
async function readGps(file){
  try{
    const gps = await exifr.gps(file);
    if(gps && isFinite(gps.latitude) && isFinite(gps.longitude)) return {lat:gps.latitude, lon:gps.longitude};
  }catch(_){}
  return null;
}
async function compressPhoto(file, maxDim=1600, quality=0.82){
  const img = await createImageBitmap(file);
  let w=img.width, h=img.height;
  if(Math.max(w,h) > maxDim){ const sc=maxDim/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  cv.getContext('2d').drawImage(img,0,0,w,h);
  return await new Promise(res=>cv.toBlob(res,'image/jpeg',quality));
}
async function onPhotoChange(e){
  const f=e.target.files[0];
  const hint=document.getElementById('rptPhotoHint'), prev=document.getElementById('rptPhotoPrev'), img=document.getElementById('rptPhotoImg');
  photoFile=f||null; photoBlob=null;
  if(!f){ prev.hidden=true; hint.textContent=''; updateSubmit(); return; }
  hint.textContent='사진 처리 중…';
  const gps=await readGps(f);
  if(gps){
    setPin(gps.lon, gps.lat);
    if(rptMap){ rptMap.getView().setCenter(ol.proj.fromLonLat([gps.lon,gps.lat])); rptMap.getView().setZoom(13); }
    hint.textContent='사진에서 위치를 자동으로 읽었습니다. 지도에서 확인·수정할 수 있어요.';
  } else {
    hint.textContent='사진에 위치정보가 없습니다. 지도를 클릭해 발견 위치를 지정하세요.';
  }
  try{
    photoBlob = await compressPhoto(f);
    img.src = URL.createObjectURL(photoBlob);
    prev.hidden = false;
  }catch(err){
    hint.textContent = '사진을 처리하지 못했습니다. 다른 사진으로 다시 시도하세요.';
  }
  updateSubmit();
}
function clearPhoto(){
  photoFile=null; photoBlob=null;
  document.getElementById('rptPhoto').value='';
  document.getElementById('rptPhotoPrev').hidden=true;
  document.getElementById('rptPhotoHint').textContent='';
  updateSubmit();
}
function toggleUrlField(){
  const w=document.getElementById('rptUrlWrap'), t=document.getElementById('rptUrlToggle');
  w.hidden=!w.hidden;
  t.textContent = w.hidden ? '사진이 없다면 URL로 제보 →' : 'URL 입력란 숨기기';
  if(!w.hidden) document.getElementById('rptUrl').focus();
  updateSubmit();
}

function renderSp(){
  const w=document.getElementById('rptSpWrap'); if(!w) return;
  if(selSp){
    w.innerHTML='<label>대상 종</label><div class="rpt-sp"><div style="min-width:0">'+
      '<span class="nm">'+esc(selSp.n||selSp.s)+'</span> <span class="sci">'+esc(selSp.s)+'</span></div>'+
      '<button class="chg" type="button">변경</button></div>';
    w.querySelector('.chg').onclick=()=>{ selSp=null; renderSp(); updateSubmit(); };
  } else {
    w.innerHTML='<label>종 <span class="req">*</span></label>'+
      '<input type="search" id="rptSpSearch" placeholder="국명·학명 검색(예: 수달, Lutra)" autocomplete="off">'+
      '<div class="rpt-srlist" id="rptSpList" hidden></div>';
    const inp=document.getElementById('rptSpSearch'), list=document.getElementById('rptSpList');
    inp.addEventListener('input',()=>{
      const qq=inp.value.trim().toLowerCase();
      if(qq.length<1){ list.hidden=true; list.innerHTML=''; return; }
      const hits=[];
      for(let i=0;i<SPIDX.length && hits.length<8;i++){ const x=SPIDX[i];
        if((x.n&&x.n.toLowerCase().includes(qq))||(x.s&&x.s.toLowerCase().includes(qq))) hits.push(x); }
      if(!hits.length){ list.hidden=true; list.innerHTML=''; return; }
      list.innerHTML=hits.map(x=>'<div class="it" data-k="'+esc(x.k)+'">'+esc(x.n||x.s)+'<span class="sci">'+esc(x.s)+'</span></div>').join('');
      list.hidden=false;
      list.querySelectorAll('.it').forEach(it=>it.onclick=()=>{
        const x=SPIDX.find(s=>s.k===it.dataset.k);
        if(x){ selSp={k:x.k,n:x.n,s:x.s,t:x.t,g:x.g}; renderSp(); updateSubmit(); }
      });
    });
    inp.focus();
  }
}

function initMap(){
  const el=document.getElementById('rptMap'); if(!el || typeof ol==='undefined') return;
  if(!pinSrc) pinSrc=new ol.source.Vector();
  const pinLayer=new ol.layer.Vector({source:pinSrc, style:new ol.style.Style({
    image:new ol.style.Circle({radius:7, fill:new ol.style.Fill({color:'#c0392b'}), stroke:new ol.style.Stroke({color:'#fff',width:2})}) })});
  if(!rptMap){
    rptMap=new ol.Map({target:el,
      layers:[new ol.layer.Tile({source:new ol.source.OSM({crossOrigin:'anonymous'})}), pinLayer],
      controls:ol.control.defaults.defaults({attribution:false}),
      view:new ol.View({center:ol.proj.fromLonLat([127.8,36.3]), zoom:6, minZoom:5, maxZoom:18})});
    rptMap.on('singleclick',(e)=>{
      const ll=ol.proj.toLonLat(e.coordinate); setPin(ll[0],ll[1]);
    });
  } else {
    rptMap.setTarget(el);
  }
  pinSrc.clear();
  const cc=document.getElementById('rptCoord'); if(cc) cc.textContent='';
  rptMap.getView().setCenter(ol.proj.fromLonLat([127.8,36.3]));
  rptMap.getView().setZoom(6);
  setTimeout(()=>rptMap.updateSize(),60);
}
function setPin(lon,lat){
  latlon={lon:+lon.toFixed(5), lat:+lat.toFixed(5)};
  pinSrc.clear();
  pinSrc.addFeature(new ol.Feature(new ol.geom.Point(ol.proj.fromLonLat([latlon.lon,latlon.lat]))));
  const cc=document.getElementById('rptCoord'); if(cc) cc.textContent='선택 위치: '+latlon.lat+', '+latlon.lon;
  updateSubmit();
}

function validUrl(u){ return /^https?:\/\/.+/i.test(u); }
function hasEvidence(){
  const url=(document.getElementById('rptUrl')||{}).value||'';
  return !!photoBlob || validUrl(url.trim());
}
function updateSubmit(){
  const su=document.getElementById('rptSubmit'); if(!su) return;
  const date=(document.getElementById('rptDate')||{}).value||'';
  su.disabled = !(selSp && latlon && hasEvidence() && date);
}
async function doSubmit(){
  const su=document.getElementById('rptSubmit'), msg=document.getElementById('rptMsg');
  const url=(document.getElementById('rptUrl')||{}).value.trim();
  const date=document.getElementById('rptDate').value;
  const note=document.getElementById('rptNote').value;
  msg.className='rpt-msg';
  if(!(selSp&&latlon&&hasEvidence()&&date)){ msg.className='rpt-msg err'; msg.textContent='종·위치·사진(또는 URL)·발견일을 모두 입력하세요.'; return; }
  su.disabled=true; su.textContent='등록 중…';
  try{
    let photo_path=null;
    if(photoBlob){
      su.textContent='사진 업로드 중…';
      const { path, error:upErr } = await uploadReportPhoto(photoBlob);
      if(upErr) throw upErr;
      photo_path=path;
    }
    su.textContent='등록 중…';
    const { error } = await submitReport({ ktsn:selSp.k, scientific_name:selSp.s, korean_name:selSp.n, taxon_group:selSp.t,
      url: url || null, photo_path, lat:latlon.lat, lon:latlon.lon, observed_date:date, note });
    if(error) throw error;
    msg.className='rpt-msg ok';
    msg.textContent='제보가 등록되었습니다. 검토 후 반영됩니다. 마이데이터에서 내 제보 이력을 볼 수 있어요.';
    su.textContent='닫기'; su.disabled=false; su.onclick=close;
  }catch(e){
    console.warn('제보 등록 실패', e);
    msg.className='rpt-msg err';
    msg.textContent='등록에 실패했습니다: '+((e&&e.message)||'알 수 없는 오류')+' — 잠시 후 다시 시도하세요.';
    su.textContent='제보 등록'; su.disabled=false; su.onclick=doSubmit;
  }
}

// 닫기(버튼·배경·ESC)
document.getElementById('rptClose').onclick=close;
overlay.addEventListener('click',(e)=>{ if(e.target===overlay) close(); });
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'&&!overlay.hidden) close(); });

// #report 해시 진입(시민과학 탭 '제보하기' 딥링크)
function checkHash(){ if(location.hash==='#report' && configured) open(null); }
window.addEventListener('hashchange',checkHash);

function refreshCardBtn(){                                // 이미 렌더된 종 카드 버튼 재배선(딥링크/인증 확정 후)
  const b=document.querySelector('.report-lk[data-k]'); if(!b) return;
  const x=SPIDX.find(s=>s.k===b.dataset.k); if(x) decorateCard(x);
}
window.fgReport={ configured, decorateCard, open };
if(configured){
  refreshCardBtn();
  onAuth(u=>{ user=u; refreshCardBtn(); if(!overlay.hidden) render(); });
  checkHash();
  // 챗 딥링크 ?sp=..&report=1 → 해당 종 미리 선택해 제보 모달 자동 오픈(로그인 여부는 render가 게이트)
  const act=window.FG_ACTION;
  if(act && act.act==='report'){ const sp=SPIDX.find(s=>s.k===act.sp); if(sp) open(sp); }
}
</script>
</body>
