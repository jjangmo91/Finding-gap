<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발견공백 도우미 — 대화형</title>
<style>
  :root{
    --ink:#1b201d; --muted:#6b7280; --faint:#9aa0a6; --line:#e7e7e2; --bg:#fafaf8; --card:#fff;
    --accent:#2f6f5e; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:24px 16px 40px}
  a{color:inherit}
  .back{display:inline-block;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:14px}
  .back:hover{color:var(--accent)}
  header h1{margin:0 0 4px;font-size:23px;letter-spacing:-.01em}
  header h1 b{color:var(--accent)}
  header .sub{color:var(--muted);font-size:13.5px;margin:0;max-width:60ch}
  /* auth */
  .authcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;max-width:440px;margin-top:22px}
  .authcard h3{margin:0;font-size:15.5px}
  .authcard p{margin:6px 0 14px;color:var(--muted);font-size:13px}
  .authcard input[type=email]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:10px;font-family:inherit}
  .btn{appearance:none;border:0;border-radius:9px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
  .btn.sec{background:#eef1ef;color:#33403b}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.goog{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#fff;color:#33403b;border:1px solid var(--line);margin-top:8px}
  .btn.goog svg{width:17px;height:17px;display:block;flex:none}
  .authmsg{margin-top:10px;font-size:12.5px;padding:8px 10px;border-radius:8px}
  .authmsg.ok{background:#eef6f0;color:#2c6a4f;border:1px solid #cfe6d8}
  .authmsg.err{background:#fbeeea;color:#9a3412;border:1px solid #f1d2c6}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--faint);font-size:11.5px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  /* chat */
  .topline{display:flex;align-items:center;gap:10px;margin:22px 0 12px;flex-wrap:wrap}
  .topline .who{font-size:13px;color:var(--muted)}
  .topline .who b{color:var(--ink);font-weight:600}
  .topline .rem{margin-left:auto;font-size:11.5px;color:var(--faint)}
  .chatbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;min-height:340px;max-height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .intro{color:var(--muted);font-size:13px;line-height:1.6}
  .msg{max-width:82%;padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
  .msg.bot{align-self:flex-start;background:#f1f3f1;color:var(--ink);border-bottom-left-radius:5px}
  .msg.err{align-self:flex-start;background:#fbeeea;color:#9a3412;border:1px solid #f1d2c6}
  .msg .tools{display:block;margin-top:6px;font-size:10.5px;color:var(--faint)}
  .msg .maplink{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;font-weight:600;
    color:var(--accent);text-decoration:none;border:1px solid #cdddce;background:#f4f8f6;border-radius:8px;padding:6px 11px}
  .msg .maplink:hover{border-color:var(--accent);background:#eaf3ee}
  .typing{align-self:flex-start;color:var(--faint);font-size:13px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 4px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 12px;
    font-size:12px;color:#3a3f3c;cursor:pointer}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .inrow{display:flex;gap:8px;margin-top:12px}
  .inrow textarea{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;
    font-family:inherit;resize:none;line-height:1.5;max-height:120px}
  .inrow textarea:focus{outline:none;border-color:var(--accent)}
  .note{margin-top:10px;font-size:11px;color:var(--faint);line-height:1.5}
  @media(max-width:560px){ .msg{max-width:90%} }
</style>
<script src="config.js" onerror="window.SUPABASE_URL=window.SUPABASE_URL||''"></script>
<script src="fg_analytics.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <a class="back" href="index.html">← 홈</a>
    <h1>발견공백 <b>도우미</b></h1>
    <p class="sub">한국 생물종의 발견공백을 대화로 물어보세요. 지역·분류군·멸종위기 기준으로 아직 기록이 없는 종을 찾아 드립니다.</p>
  </header>
  <div id="view"><p class="intro" style="margin-top:24px">불러오는 중…</p></div>
</div>

<script type="module">
import { sb, configured, onAuth, sendMagicLink, signInWithGoogle, signOut } from './fg_supabase.js';

const view = document.getElementById('view');
const enabled = !!window.CHAT_ENABLED;
const ENDPOINT = (window.SUPABASE_URL || '').replace(/\/$/, '') + '/functions/v1/chat';
const EXAMPLES = [
  '종로구에서 아직 발견 안 된 멸종위기종 알려줘',
  '강원도 조류 발견공백은 어느 정도야?',
  '수달은 전국에서 최근에 발견됐어?',
  '전국 분류군별 발견/미발견 요약해줘',
];

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

// 백엔드가 준 지도 힌트(out.map) → service.html 딥링크 URL(값 화이트리스트 검증). 힌트 없으면 ''.
function mapHref(m){
  if(!m || (m.mode!=='A' && m.mode!=='B')) return '';
  const p = new URLSearchParams();
  if(m.mode==='B'){
    if(!/^[A-Za-z0-9]{1,16}$/.test(String(m.sp||''))) return '';
    p.set('sp', String(m.sp));
  } else {
    if(m.taxon && /^-?[A-Z]{1,3}$/.test(m.taxon)) p.set('taxon', m.taxon);
    if(m.sigungu && /^\d{5}$/.test(String(m.sigungu))) p.set('sigungu', String(m.sigungu));
    else if(m.sido && /^\d{2}$/.test(String(m.sido))) p.set('sido', String(m.sido));
    if(m.metric==='gap' || m.metric==='found') p.set('metric', m.metric);
    if(!p.has('taxon') && !p.has('sido') && !p.has('sigungu')) return '';   // 지역·분류군 없으면 지도 링크 무의미
  }
  return 'service.html?' + p.toString();
}

if (!configured) {
  view.innerHTML = '<div class="authcard"><h3>안내</h3><p>로그인 기능이 설정되지 않아 대화형 도우미를 이용할 수 없습니다.</p></div>';
} else if (!enabled) {
  view.innerHTML = `<div class="authcard"><h3>곧 제공됩니다</h3>
    <p>발견공백 데이터를 바탕으로 대화하는 도우미를 준비하고 있습니다. 먼저 <a href="service.html" style="color:var(--accent)">지도 서비스</a>에서 지역·분류군별 발견공백을 살펴보실 수 있어요.</p></div>`;
} else {
  onAuth(user => user ? chatView(user) : loginCard());
}

function loginCard(){
  view.innerHTML = `
  <div class="authcard">
    <h3>로그인하고 시작하기</h3>
    <p>대화형 도우미는 로그인한 이용자에게 하루 일정 횟수 제공됩니다.</p>
    <button class="btn goog" id="authGoogle"><svg viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>Google로 계속하기</button>
    <div class="divider">또는 이메일</div>
    <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
    <button class="btn" id="authSend" style="width:100%">로그인 링크 받기</button>
    <div id="authMsg"></div>
  </div>`;
  const gbtn = view.querySelector('#authGoogle'), btn = view.querySelector('#authSend');
  const email = view.querySelector('#authEmail'), msg = view.querySelector('#authMsg');
  gbtn.onclick = async () => {
    gbtn.disabled = true;
    try { const { error } = await signInWithGoogle(); if (error) throw error; }
    catch (err) { msg.className = 'authmsg err'; msg.textContent = 'Google 로그인 실패: ' + (err.message || err); gbtn.disabled = false; }
  };
  btn.onclick = async () => {
    const e = (email.value || '').trim(); if (!e) { email.focus(); return; }
    btn.disabled = true; btn.textContent = '보내는 중…';
    try { const { error } = await sendMagicLink(e); if (error) throw error;
      msg.className = 'authmsg ok'; msg.textContent = `${e} 로 로그인 링크를 보냈습니다. 메일함을 확인하세요.`;
    } catch (err) { msg.className = 'authmsg err'; msg.textContent = '전송 실패: ' + (err.message || err); btn.disabled = false; btn.textContent = '로그인 링크 받기'; }
  };
  email.addEventListener('keydown', ev => { if (ev.key === 'Enter') btn.click(); });
}

function chatView(user){
  view.innerHTML = `
  <div class="topline">
    <span class="who"><b>${esc(user.email || '이용자')}</b> 님</span>
    <button class="btn sec" id="logout" style="padding:6px 12px;font-size:12px">로그아웃</button>
    <span class="rem" id="rem"></span>
  </div>
  <div class="chatbox" id="box">
    <div class="intro">안녕하세요. 지역·분류군·멸종위기 기준으로 <b>아직 발견되지 않은 종(발견공백)</b>을 찾아 드립니다. 아래 예시를 눌러 보거나 직접 질문해 보세요. 지역·종 질문에는 답변에서 <b>지도</b>로 바로 이어집니다.</div>
  </div>
  <div class="chips" id="chips">${EXAMPLES.map(e => `<button class="chip">${esc(e)}</button>`).join('')}</div>
  <div class="inrow">
    <textarea id="q" rows="1" placeholder="예: 제주도에서 아직 발견 안 된 양서류 알려줘" maxlength="500"></textarea>
    <button class="btn" id="send">보내기</button>
  </div>
  <p class="note">답변은 공개 집계 데이터를 바탕으로 하며 부정확할 수 있습니다. 정확한 위치·개인정보는 제공하지 않습니다.</p>`;

  const box = view.querySelector('#box'), q = view.querySelector('#q');
  const send = view.querySelector('#send'), rem = view.querySelector('#rem');
  const msgs = [];              // 서버로 보내는 대화 이력(role/content)
  let busy = false;

  view.querySelector('#logout').onclick = async () => { await signOut(); location.reload(); };
  view.querySelectorAll('#chips .chip').forEach(c => c.onclick = () => { q.value = c.textContent; q.focus(); ask(); });
  q.addEventListener('input', () => { q.style.height = 'auto'; q.style.height = Math.min(q.scrollHeight, 120) + 'px'; });
  q.addEventListener('keydown', ev => { if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); ask(); } });
  send.onclick = ask;

  function bubble(cls, html){ const d = document.createElement('div'); d.className = 'msg ' + cls; d.innerHTML = html; box.appendChild(d); box.scrollTop = box.scrollHeight; return d; }

  async function ask(){
    const text = (q.value || '').trim();
    if (!text || busy) return;
    busy = true; send.disabled = true;
    bubble('user', esc(text));
    msgs.push({ role: 'user', content: text });
    q.value = ''; q.style.height = 'auto';
    const wait = document.createElement('div'); wait.className = 'typing'; wait.textContent = '찾는 중…';
    box.appendChild(wait); box.scrollTop = box.scrollHeight;
    window.fgTrack && window.fgTrack('chat_send');
    try {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token, 'apikey': window.SUPABASE_KEY || '' },
        body: JSON.stringify({ messages: msgs }),
      });
      const out = await res.json().catch(() => ({}));
      wait.remove();
      if (!res.ok) {
        bubble('err', esc(out.error || '요청을 처리하지 못했습니다. 잠시 후 다시 시도해 주세요.'));
        if (res.status === 429 && rem) rem.textContent = '오늘 사용 한도 소진';
      } else {
        const tools = (out.used_tools && out.used_tools.length) ? `<span class="tools">조회: ${esc([...new Set(out.used_tools)].join(', '))}</span>` : '';
        const href = mapHref(out.map);
        const maplink = href ? `<a class="maplink" href="${esc(href)}" target="_blank" rel="noopener">지도에서 보기 →</a>` : '';
        bubble('bot', esc(out.reply || '') + tools + maplink);
        msgs.push({ role: 'assistant', content: out.reply || '' });
        if (typeof out.remaining === 'number' && rem) rem.textContent = `오늘 남은 질문 ${out.remaining}회`;
      }
    } catch (_e) {
      wait.remove();
      bubble('err', '네트워크 오류로 답변을 받지 못했습니다.');
    } finally {
      busy = false; send.disabled = false; q.focus();
    }
  }
}
</script>
</body>
</html>
