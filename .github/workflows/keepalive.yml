name: keepalive

# Supabase 무료 플랜은 7일 무접속 시 자동 일시정지된다.
# 홈 피드가 쓰는 공개 RPC를 주기적으로 호출해 프로젝트를 활성 상태로 유지한다.
on:
  schedule:
    - cron: '19 4 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS -X POST \
            "https://obffnziuylmffiboxrlx.supabase.co/rest/v1/rpc/community_reports" \
            -H "apikey: sb_publishable_9Zjsn5gXPQz70jukqCe2HQ__yBeKYDw" \
            -H "Content-Type: application/json" \
            -d '{"lim":1}' \
            -o /dev/null -w "%{http_code}")
          echo "status $code"
          test "$code" = "200"
